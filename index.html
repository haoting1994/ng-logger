<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>攝影棚場景管理系統</title>
<style>
  :root {
    --bg: #2a2a2a; --bg2: #222; --bg3: #333;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --accent: #e8720c; --accent2: #c45e08;
    --blue: #3a8fd4; --red: #d04040;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #eee; min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; background: var(--bg); }

  .sidebar-header { padding: 16px 16px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .sidebar-header p { font-size: 11px; color: #888; margin-top: 2px; }
  .sync-status { font-size: 10px; margin-top: 5px; color: #888; display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.online { background: #4caf50; }
  .sync-dot.saving { background: var(--accent); animation: pulse 0.8s infinite; }
  .sync-dot.error  { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-search input { width: 100%; background: #2e2e2e; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; color: #ddd; font-size: 12px; outline: none; }
  .sidebar-search input::placeholder { color: #555; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 12px; color: #aaa; border-left: 2px solid transparent; transition: background 0.1s, color 0.1s; position: relative; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #ddd; }
  .nav-item.active { background: rgba(232,114,12,0.18); color: var(--accent); border-left-color: var(--accent); }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .nav-item.active .dot { background: var(--accent); }
  .nav-item .drag-handle { color: #555; font-size: 11px; cursor: grab; padding: 2px 3px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .nav-item:hover .drag-handle { opacity: 1; }
  .nav-item.drag-over { border-top: 2px solid var(--accent); }
  .nav-item.dragging-item { opacity: 0.4; }
  /* 分類區塊 header */
  .nav-category { padding: 10px 14px 4px; display: flex; align-items: center; gap: 6px; user-select: none; }
  .nav-category-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .nav-category-dot.real { background: #e8720c; }
  .nav-category-dot.green { background: #3ecf6a; }
  .nav-category-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-category-label.real { color: #e8720c; }
  .nav-category-label.green { color: #3ecf6a; }
  .nav-category-label.none { color: #555; }
  .nav-category-dot.none { background: #444; }
  /* drop zone highlight on category */
  .nav-category.drop-active { background: rgba(255,255,255,0.05); border-radius: 4px; }
  .nav-add { margin: 8px 12px; padding: 7px; border: 1px dashed #555; border-radius: var(--radius-sm); font-size: 12px; color: #777; text-align: center; cursor: pointer; transition: all 0.15s; }
  .nav-add:hover { border-color: var(--accent); color: var(--accent); }

  .main-header { padding: 24px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .main-header-left { flex: 1; min-width: 0; }
  /* 節目分類標籤 */
  .studio-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
  .studio-badge.real  { background: rgba(232,114,12,0.2); color: #e8720c; border: 1px solid rgba(232,114,12,0.4); }
  .studio-badge.green-studio { background: rgba(62,207,106,0.15); color: #3ecf6a; border: 1px solid rgba(62,207,106,0.3); }
  /* 場景圖說欄 */
  .scene-caption { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .scene-caption input { flex: 1; background: #3a3a3a; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 7px 12px; color: #ccc; font-size: 13px; font-family: inherit; outline: none; }
  .scene-caption input:focus { border-color: rgba(255,255,255,0.25); }
  .scene-caption input::placeholder { color: #555; }
  /* 分類選擇器 — 圓點樣式 */
  .type-sel-wrap { position: relative; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; padding: 4px 10px 4px 8px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); transition: border-color 0.15s; }
  .type-sel-wrap:hover { border-color: rgba(255,255,255,0.28); }
  .type-sel-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background 0.2s; }
  .type-sel-dot.real  { background: #e8720c; box-shadow: 0 0 5px #e8720c88; }
  .type-sel-dot.green { background: #3ecf6a; box-shadow: 0 0 5px #3ecf6a88; }
  .type-sel-dot.none  { background: #444; }
  .type-sel-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; transition: color 0.2s; }
  .type-sel-label.real  { color: #e8720c; }
  .type-sel-label.green { color: #3ecf6a; }
  .type-sel-label.none  { color: #555; }
  /* 選了棚別時外框也上色 */
  .type-sel-wrap:has(.type-sel-dot.real)  { border-color: #e8720c66; }
  .type-sel-wrap:has(.type-sel-dot.green) { border-color: #3ecf6a55; }
  .type-sel-wrap select { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .editable-title { background: none; border: none; font-size: 22px; font-weight: 600; color: #eee; font-family: inherit; outline: none; width: 100%; }
  .editable-title:focus { border-bottom: 1px solid rgba(255,255,255,0.2); }
  .scene-note-input { font-size: 13px; color: #888; background: none; border: none; outline: none; width: 100%; margin-top: 4px; padding: 0; font-family: inherit; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .status-sel { background: #3a3a3a; border: 1px solid rgba(255,255,255,0.15); color: #aaa; padding: 5px 10px; border-radius: 20px; font-size: 11px; outline: none; cursor: pointer; font-family: inherit; }

  .section-tabs { display: flex; gap: 4px; padding: 16px 28px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .stab { padding: 8px 18px; font-size: 13px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .stab:hover { color: #ccc; }
  .stab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  .panel { padding: 24px 28px; display: none; }
  .panel.active { display: block; }
  .sec-label { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .panel-gap { margin-top: 24px; }

  /* ── GALLERY SLIDER ── */
  .gallery-wrap { position: relative; }
  .gallery-slider { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 0 0 10px; scrollbar-width: thin; scrollbar-color: #444 transparent; }
  .gallery-slider::-webkit-scrollbar { height: 4px; }
  .gallery-slider::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
  .gallery-slide { position: relative; flex-shrink: 0; width: 72%; max-width: 680px; min-width: 260px; border-radius: var(--radius); overflow: hidden; background: #3a3a3a; border: 1px solid rgba(255,255,255,0.1); scroll-snap-align: start; }
  .gallery-slide img { width: 100%; max-height: 420px; object-fit: contain; display: block; background: #2e2e2e; }
  .gallery-slide .slide-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 10px; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: flex-end; opacity: 0; transition: opacity 0.2s; }
  .gallery-slide:hover .slide-label { opacity: 1; }
  .gallery-slide .slide-label input { display: none; }
  .gallery-slide .slide-del { background: none; border: none; color: #888; font-size: 14px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .gallery-slide .slide-del:hover { color: var(--red); }
  .gallery-slide .light-tag { position: absolute; }
  .gallery-add-slide { flex-shrink: 0; width: 140px; min-height: 200px; border-radius: var(--radius); border: 1px dashed rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #666; font-size: 12px; cursor: pointer; transition: all 0.15s; scroll-snap-align: start; background: rgba(255,255,255,0.02); }
  .gallery-add-slide:hover, .gallery-add-slide.drag-over { border-color: var(--accent); color: var(--accent); background: rgba(232,114,12,0.06); }
  .gallery-add-slide span:first-child { font-size: 24px; }
  .cam-img-zone.drag-over { border-color: var(--accent); background: rgba(232,114,12,0.06); }
  /* Onair slides */
  .onair-slide { position: relative; flex-shrink: 0; width: 72%; max-width: 680px; min-width: 260px; border-radius: var(--radius); overflow: hidden; background: #3a3a3a; border: 1px solid rgba(255,255,255,0.1); scroll-snap-align: start; cursor: pointer; }
  .onair-slide img { width: 100%; max-height: 460px; object-fit: contain; display: block; background: #2e2e2e; }
  .onair-slide .slide-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: rgba(0,0,0,0.6); font-size: 12px; color: #ccc; display: flex; align-items: center; justify-content: space-between; }
  .onair-slide .slide-label input { background: none; border: none; color: #eee; font-size: 12px; font-family: inherit; outline: none; flex: 1; min-width: 0; }
  .onair-slide-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #666; font-size: 13px; min-height: 260px; }

  /* ── 平板直式 & 手機：攝影機 + 上線畫面改成垂直排列 ── */
  @media (max-width: 900px) {
    .gallery-slider.vertical { flex-direction: column; overflow-x: visible; scroll-snap-type: none; padding: 0; }
    .gallery-slider.vertical .cam-slide,
    .gallery-slider.vertical .onair-slide,
    .gallery-slider.vertical .gallery-add-slide { width: 100%; max-width: 100%; flex-shrink: unset; scroll-snap-align: none; }
    .gallery-slider.vertical .cam-slide img,
    .gallery-slider.vertical .onair-slide img { max-height: none; }
    .gallery-slider.vertical .gallery-add-slide { width: 100%; min-height: 72px; flex-direction: row; justify-content: center; gap: 10px; }
    .gallery-slider.vertical .gallery-add-slide span:first-child { font-size: 18px; }
  }
  @media (max-width: 600px) {
    .gallery-slide, .onair-slide { width: 88%; }
    .gallery-slider.vertical .gallery-slide,
    .gallery-slider.vertical .onair-slide { width: 100%; }
  }

  /* ── LIGHT TAGS ── */
  .light-tag { position: absolute; border-radius: 20px; padding: 4px 9px; display: flex; align-items: center; gap: 5px; cursor: move; user-select: none; backdrop-filter: blur(6px); box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: box-shadow 0.15s; }
  .light-tag:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.6); }
  /* A燈 — 黃 */
  .light-tag.c-yellow { background: rgba(26,22,0,0.82); border: 1.5px solid #e8c40c; }
  .light-tag.c-yellow .tag-val { color: #e8c40c; }
  /* B燈 — 藍 */
  .light-tag.c-blue { background: rgba(0,10,30,0.82); border: 1.5px solid #4a9fe8; }
  .light-tag.c-blue .tag-val { color: #4a9fe8; }
  /* C燈 — 綠 */
  .light-tag.c-green { background: rgba(0,20,8,0.82); border: 1.5px solid #3ecf6a; }
  .light-tag.c-green .tag-val { color: #3ecf6a; }
  .light-tag .tag-dot { display: none; }
  .light-tag .tag-values { display: flex; gap: 6px; align-items: center; }
  .light-tag .tag-val { font-size: 11px; font-weight: 700; cursor: pointer; padding: 1px 3px; border-radius: 3px; white-space: nowrap; }
  .light-tag .tag-val:hover { opacity: 0.8; }
  .light-tag .tag-val[contenteditable=true] { min-width: 28px; }
  .light-tag .tag-sep { display: none; }

  /* ── LIGHT CARDS ── */
  .lights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 16px; }
  .light-card { border-radius: var(--radius-sm); padding: 12px 14px; min-width: 0; transition: opacity 0.2s; }
  .light-card.off { opacity: 0.28; }
  /* 燈組顏色外框 */
  .light-card.g-yellow { background: rgba(40,34,0,0.7); border: 1.5px solid #e8c40c44; }
  .light-card.g-yellow.on { border-color: #e8c40c99; }
  .light-card.g-blue   { background: rgba(0,16,40,0.7); border: 1.5px solid #4a9fe844; }
  .light-card.g-blue.on   { border-color: #4a9fe899; }
  .light-card.g-green  { background: rgba(0,28,12,0.7); border: 1.5px solid #3ecf6a44; }
  .light-card.g-green.on  { border-color: #3ecf6a99; }
  .light-card-top { display: flex; align-items: center; margin-bottom: 10px; }
  .lc-name-row { display: flex; align-items: center; gap: 8px; width: 100%; }
  .lc-name-row .light-card-name { flex: 1; min-width: 0; }
  .lc-name-row .rgb-toggle { margin-left: auto; flex-shrink: 0; }
  /* 電源按鈕 */
  .power-btn { background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1; padding: 2px; flex-shrink: 0; filter: grayscale(1) brightness(0.4); transition: filter 0.2s; }
  .power-btn.on { filter: grayscale(0) brightness(1.1); }
  .light-card.g-yellow .power-btn.on { color: #e8c40c; }
  .light-card.g-blue   .power-btn.on { color: #4a9fe8; }
  .light-card.g-green  .power-btn.on { color: #3ecf6a; }
  /* 燈具選擇 */
  .fixture-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
  .fixture-btn { font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #555; cursor: pointer; transition: all 0.15s; }
  .fixture-btn:hover { color: #aaa; border-color: rgba(255,255,255,0.25); }
  .fixture-btn.active { background: rgba(255,255,255,0.18); color: #eee; border-color: rgba(255,255,255,0.45); font-weight: 600; }
  .honeycomb-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .honeycomb-row label { font-size: 11px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 4px; }

  /* RGB 圓點 toggle */
  .rgb-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; }
  .rgb-toggle .rgb-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #555; background: transparent; transition: all 0.15s; }
  .rgb-toggle.on .rgb-dot { background: #4a9fe8; border-color: #4a9fe8; box-shadow: 0 0 4px #4a9fe8aa; }
  .rgb-toggle .rgb-label { font-size: 10px; color: #555; letter-spacing: 0.03em; transition: color 0.15s; }
  .rgb-toggle.on .rgb-label { color: #4a9fe8; }
  .light-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .lf { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .lf label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .lf input { background: #2a2a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 5px 7px; color: #eee; font-size: 12px; font-weight: 500; outline: none; font-family: inherit; width: 100%; min-width: 0; }
  .lf input:focus { border-color: var(--accent); }
  .lf.full { grid-column: 1 / -1; }

  .cam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .cam-card { background: #3c3c3c; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 16px; min-width: 0; }
  .cam-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cam-name { font-size: 14px; font-weight: 700; background: none; border: none; font-family: inherit; color: var(--blue); outline: none; width: 80px; min-width: 0; }
  .cam-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cam-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .cam-field label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .cam-field input { background: #2a2a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 6px 8px; color: #eee; font-size: 13px; font-weight: 500; outline: none; font-family: 'Courier New', monospace; width: 100%; min-width: 0; }
  .cam-field input:focus { border-color: var(--blue); }
  .cam-field.full { grid-column: 1 / -1; }
  /* ── CAM SLIDE UI ── */
  .cam-slide { flex-shrink: 0; width: 72%; max-width: 680px; min-width: 260px; border-radius: var(--radius); overflow: hidden; background: #3a3a3a; border: 1px solid rgba(255,255,255,0.1); scroll-snap-align: start; }
  .cam-slide-img { position: relative; cursor: pointer; min-height: 200px; display: flex; align-items: center; justify-content: center; background: #2e2e2e; }
  .cam-slide-img img { width: 100%; max-height: 380px; object-fit: contain; display: block; }
  .cam-slide-img .cam-img-hint { color: #555; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cam-slide-img .cam-img-hint span:first-child { font-size: 24px; }
  .cam-slide-img .img-change-btn { position: absolute; top: 8px; right: 8px; display: none; }
  .cam-slide-img:hover .img-change-btn { display: block; }
  .cam-slide-info { padding: 12px 14px; }
  .cam-slide-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .cam-slide-name { font-size: 14px; font-weight: 700; color: var(--blue); background: none; border: none; font-family: inherit; outline: none; min-width: 0; flex: 1; }
  .cam-specs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .cam-spec { display: flex; flex-direction: column; gap: 2px; }
  .cam-spec label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .cam-spec input { background: #2a2a2a; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 4px 6px; color: #ddd; font-size: 11px; font-family: 'Courier New', monospace; outline: none; width: 100%; }
  .cam-spec input:focus { border-color: var(--blue); }
  /* 上線畫面 shot-type */
  .shot-type-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .shot-btn { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: none; color: #666; cursor: pointer; transition: all 0.15s; }
  .shot-btn.active { background: rgba(255,255,255,0.12); color: #ccc; border-color: rgba(255,255,255,0.3); }
  @media (max-width: 600px) {
    .cam-slide { width: 90%; }
    .cam-specs { grid-template-columns: repeat(3, 1fr); }
  }

  .onair-slide { flex-shrink: 0; width: 72%; max-width: 680px; min-width: 260px; border-radius: var(--radius); overflow: hidden; background: #3a3a3a; border: 1px solid rgba(255,255,255,0.1); scroll-snap-align: start; }
  .onair-slide-img { position: relative; cursor: pointer; min-height: 200px; display: flex; align-items: center; justify-content: center; background: #2e2e2e; }
  .onair-slide-img img { width: 100%; max-height: 420px; object-fit: contain; display: block; }
  .onair-slide-img .img-change-btn { position: absolute; top: 8px; right: 8px; display: none; }
  .onair-slide-img:hover .img-change-btn { display: block; }
  .onair-slide-img .onair-hint { color: #555; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .onair-slide-img .onair-hint span:first-child { font-size: 28px; }
  .onair-slide-info { padding: 10px 14px 12px; }
  .onair-slide-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .onair-slide-name { font-size: 14px; font-weight: 700; color: var(--accent); background: none; border: none; font-family: inherit; outline: none; flex: 1; min-width: 0; }
  .shot-type-row { display: flex; gap: 5px; flex-wrap: wrap; }

  sp.textContent = text;
}

let isOffline = false;

function loadFromLocal() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch { return null; }
}
function saveToLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(programs)); } catch {} 
}

// 直接 3 秒後強制顯示畫面（不管 Firebase 有沒有回來）
setTimeout(() => {
  const overlay = document.getElementById('loadingOverlay');
  if (!overlay.classList.contains('hidden')) {
    isOffline = true;
    const local = loadFromLocal();
    if (local && local.length > 0) {
      programs = local;
      nextId = Math.max(...programs.map(p=>p.id), 0) + 1;
      if (!activeId && programs.length) activeId = programs[0].id;
    }
    overlay.classList.add('hidden');
    setSyncStatus('error', '離線模式');
    render();
  }
}, 3000);

onSnapshot(colRef(), snap => {
  isOffline = false;
  const incoming = [];
  snap.forEach(d => incoming.push(d.data()));
  incoming.sort((a,b) => (a.order??a.id) - (b.order??b.id));
  programs = incoming;
  nextId = programs.length ? Math.max(...programs.map(p=>p.id))+1 : 1;
  if (!activeId && programs.length) activeId = programs[0].id;
  if (activeId && !getP(activeId) && programs.length) activeId = programs[0].id;
  saveToLocal();
  document.getElementById('loadingOverlay').classList.add('hidden');
  setSyncStatus('online', '已同步');
  render();
}, err => {
  console.error('Firestore error:', err);
  isOffline = true;
  const local = loadFromLocal();
  if (local && local.length > 0) {
    programs = local;
    nextId = Math.max(...programs.map(p=>p.id), 0) + 1;
    if (!activeId && programs.length) activeId = programs[0].id;
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  setSyncStatus('error', '離線模式');
  render();
});

async function saveProgram(p) {
  saveToLocal(); // 永遠先存本機
  if (isOffline) {
    toast('已存到本機（離線模式）');
    return;
  }
  setSyncStatus('saving', '儲存中…');
  try {
    await setDoc(docRef(p.id), p);
    setSyncStatus('online', '已同步');
    toast('已儲存');
  } catch(e) {
    setSyncStatus('error', '儲存失敗');
    const msg = e.code === 'invalid-argument'
      ? '圖片太大，請減少圖片數量或改用較小的圖片'
      : '儲存失敗：' + (e.message || e.code);
    toast(msg);
    console.error('saveProgram error:', e);
  }
}
async function removeProgram(id) {
  programs = programs.filter(p => p.id !== id);
  saveToLocal();
  if (isOffline) return;
  try { await deleteDoc(docRef(id)); } catch(e) { setSyncStatus('error', '刪除失敗'); }
}
async function saveOrder() {
  saveToLocal();
  if (isOffline) return;
  try { await Promise.all(programs.map((p,i) => setDoc(docRef(p.id), {...p, order:i}))); setSyncStatus('online','已同步'); }
  catch(e) { setSyncStatus('error','儲存失敗'); }
}

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── PROGRAMS ──
function addProgram() {
  const name=prompt('節目名稱：'); if(!name) return;
  const p={id:nextId++,name,status:'準備中',sceneNote:'',sceneImg:null,sceneTagPos:{},lights:[{name:'主燈',intensity:'',kelvin:'',note:''}],cameras:[],onairImg:null,onairNote:'',order:programs.length};
  activeId=p.id; activeTab='scene';
  saveProgram(p);
}
function deleteProgram(id) {
  if(!confirm('確定刪除此節目？')) return;
  const rem=programs.filter(p=>p.id!==id);
  activeId=rem[0]?.id??null;
  removeProgram(id);
}

// ── RENDER ──
function render() { renderNav(); renderMobileNav(); renderMain(); }

function renderNav() {
  const nav = document.getElementById('navList'); if (!nav) return;
  const CATS = [
    { key: 'real',  label: '實景棚', dotCls: 'real',  labelCls: 'real' },
    { key: 'green', label: '綠幕棚', dotCls: 'green', labelCls: 'green' },
    { key: '',      label: '未分類', dotCls: 'none',  labelCls: 'none' },
  ];
  let html = '';
  CATS.forEach(cat => {
    const items = programs.filter(p => (p.studioType||'') === cat.key);
    if (cat.key === '' && items.length === 0) return; // 沒有未分類就不顯示
    html += `<div class="nav-category" data-cat="${cat.key}"
>
      <span class="nav-category-dot ${cat.dotCls}"></span>
      <span class="nav-category-label ${cat.labelCls}">${cat.label}</span>
    </div>`;
    items.forEach(p => {
      html += `<div class="nav-item ${p.id===activeId?'active':''}" data-id="${p.id}" data-name="${esc(p.name.toLowerCase())}"
        draggable="true" onclick="navClick(event,${p.id})"
        ondragstart="navDragStart(event,${p.id})" ondragover="navDragOver(event)"
        ondragleave="navDragLeave(event)" ondrop="navDrop(event,${p.id})" ondragend="navDragEnd()">
        <span class="drag-handle">⠿</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      </div>`;
    });
  });
  nav.innerHTML = html;
}
function renderMobileNav() {
  const p = getP(activeId);
  const t = document.getElementById('mobileNavTitle'); if (t && p) t.textContent = p.name;
  const list = document.getElementById('mobileNavList'); if (!list) return;
  const CATS = [
    { key: 'real',  label: '實景棚', labelCls: 'real' },
    { key: 'green', label: '綠幕棚', labelCls: 'green' },
    { key: '',      label: '未分類', labelCls: 'none' },
  ];
  let html = '';
  CATS.forEach(cat => {
    const items = programs.filter(p => (p.studioType||'') === cat.key);
    if (cat.key === '' && items.length === 0) return;
    html += `<div class="nav-category">
      <span class="nav-category-dot ${cat.key||'none'}"></span>
      <span class="nav-category-label ${cat.labelCls}">${cat.label}</span>
    </div>`;
    items.forEach(prog => {
      html += `<div class="nav-item ${prog.id===activeId?'active':''}" data-id="${prog.id}"
        onclick="setActiveId(${prog.id});setActiveTab('scene');closeMobileNav();render()">
        <span class="dot"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(prog.name)}</span>
      </div>`;
    });
  });
  list.innerHTML = html;
}
function renderMain() {
  const p=getP(activeId), area=document.getElementById('mainArea'); if(!area) return;
  if(!p){area.innerHTML='<div style="padding:40px;color:#555;font-size:14px;">請選擇或新增節目</div>';return;}
  area.innerHTML=`
    <div class="main-header">
      <div class="main-header-left">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div class="type-sel-wrap" title="點選切換棚別">
            <span class="type-sel-dot ${p.studioType==='real'?'real':p.studioType==='green'?'green':'none'}"></span>
            <span class="type-sel-label ${p.studioType==='real'?'real':p.studioType==='green'?'green':'none'}">${p.studioType==='real'?'實景棚':p.studioType==='green'?'綠幕棚':'棚別'}</span>
            <select onchange="getP(${p.id}).studioType=this.value;debouncedSave(getP(${p.id}));renderNav();renderMobileNav();renderMain()">
              <option value="" ${!p.studioType?'selected':''}>未分類</option>
              <option value="real" ${p.studioType==='real'?'selected':''}>實景棚</option>
              <option value="green" ${p.studioType==='green'?'selected':''}>綠幕棚</option>
            </select>
          </div>
          <input class="editable-title" value="${esc(p.name)}"
            oninput="getP(${p.id}).name=this.value;renderNav();renderMobileNav();debouncedSave(getP(${p.id}))">
        </div>
        <input class="scene-note-input" placeholder="場景說明備註…" value="${esc(p.sceneNote)}"
          oninput="getP(${p.id}).sceneNote=this.value;debouncedSave(getP(${p.id}))">
      </div>
      <div class="header-actions">
        <select class="status-sel" onchange="getP(${p.id}).status=this.value;saveProgram(getP(${p.id}))">
          ${['調整中','就緒','上線中'].map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="btn btn-danger" onclick="deleteProgram(${p.id})">刪除</button>
      </div>
    </div>
    <div class="section-tabs">
      <div class="stab ${activeTab==='scene'?'active':''}" onclick="setActiveTab('scene');renderMain()">場景圖 ＋ 燈光</div>
      <div class="stab ${activeTab==='camera'?'active':''}" onclick="setActiveTab('camera');renderMain()">攝影機設定</div>
      <div class="stab ${activeTab==='onair'?'active':''}" onclick="setActiveTab('onair');renderMain()">上線畫面</div>
    </div>
    ${activeTab==='scene'?renderScene(p):activeTab==='camera'?renderCamera(p):renderOnair(p)}`;
  // 等 DOM 更新後夾回超出邊界的標籤
  if (activeTab === 'scene') requestAnimationFrame(() => clampTags(p.id));
}

function renderScene(p) {
  if (!p.sceneImgs) p.sceneImgs = p.sceneImg ? [{src:p.sceneImg,label:'佈光圖'}] : [];

  // 依棚別決定燈光配置
  const isGreenStudio = p.studioType === 'green';

  // 顏色 → CSS class
  const colorClass = c => ({'orange':'c-orange','yellow':'c-yellow','blue':'c-blue','white':'c-white'}[c]||'c-orange');

  const FIXED_LIGHTS_DEF = isGreenStudio ? [
    {key:'G1',group:'green'},{key:'G2',group:'green'},{key:'G3',group:'green'},
  ] : [
    {key:'A1',group:'yellow'},{key:'A2',group:'yellow'},
    {key:'B1',group:'blue'},{key:'B2',group:'blue'},
    {key:'C1',group:'green'},{key:'C2',group:'green'},{key:'C3',group:'green'},
  ];
  const tags = p.lights.map((l,i)=>{
    if (l.on === false) return ''; // 關閉的燈不顯示標籤
    const group = (FIXED_LIGHTS_DEF[i]||{}).group || 'yellow';
    const cls = `c-${group}`;
    let pos = (p.sceneTagPos||{})[i];
    let posStyle;
    if (pos && typeof pos.leftPct === 'number') {
      posStyle = `left:${pos.leftPct}%;top:${pos.topPct}%`;
    } else if (pos && pos.left) {
      posStyle = `left:${pos.left};top:${pos.top}`;
    } else {
      const defaultLeft = Math.min(5 + (i % 4) * 22, 72);
      const defaultTop  = 5 + Math.floor(i / 4) * 22;
      posStyle = `left:${defaultLeft}%;top:${defaultTop}%`;
    }
    const isRGB = l.isRGB || false;
    if (isRGB) {
      return `<div class="light-tag ${cls}" id="ltag-${i}" style="${posStyle}"
        onmousedown="startDrag(event,${p.id},${i})" ontouchstart="startTouchDrag(event,${p.id},${i})">
        <span class="tag-dot"></span>
        <span class="tag-values">
          <span class="tag-val" contenteditable="true"
            oninput="getP(${p.id}).lights[${i}].intensity=this.innerText.trim();debouncedSave(getP(${p.id}))"
            onclick="event.stopPropagation()">${esc(l.intensity||'H—')}</span>
          <span class="tag-sep">/</span>
          <span class="tag-val" contenteditable="true"
            oninput="getP(${p.id}).lights[${i}].kelvin=this.innerText.trim();debouncedSave(getP(${p.id}))"
            onclick="event.stopPropagation()">${esc(l.kelvin||'S—')}</span>
          <span class="tag-sep">/</span>
          <span class="tag-val" contenteditable="true"
            oninput="getP(${p.id}).lights[${i}].intensity2=this.innerText.trim();debouncedSave(getP(${p.id}))"
            onclick="event.stopPropagation()">${esc(l.intensity2||'i—')}</span>
        </span></div>`;
    }
    return `<div class="light-tag ${cls}" id="ltag-${i}" style="${posStyle}"
      onmousedown="startDrag(event,${p.id},${i})" ontouchstart="startTouchDrag(event,${p.id},${i})">
      <span class="tag-dot"></span>
      <span class="tag-values">
        <span class="tag-val" contenteditable="true"
          oninput="getP(${p.id}).lights[${i}].intensity=this.innerText.trim();debouncedSave(getP(${p.id}))"
          onclick="event.stopPropagation()">${esc(l.intensity||'—')}</span>
        <span class="tag-sep">/</span>
        <span class="tag-val" contenteditable="true"
          oninput="getP(${p.id}).lights[${i}].kelvin=this.innerText.trim();debouncedSave(getP(${p.id}))"
          onclick="event.stopPropagation()">${esc(l.kelvin||'—')}</span>
      </span></div>`;
  }).join('');

  const slides = p.sceneImgs.map((img,si)=>`
    <div class="gallery-slide" id="sceneZone${p.id}_${si}">
      <img src="${img.src}" draggable="false">
      ${si===0 ? tags : ''}
      <div class="slide-label">
        <input value="${esc(img.label||'')}" placeholder="圖片說明（佈光圖、場佈圖…）"
          oninput="getP(${p.id}).sceneImgs[${si}].label=this.value;debouncedSave(getP(${p.id}))"
          onclick="event.stopPropagation()">
        <button class="slide-del" onclick="removeSceneImg(${p.id},${si})">✕</button>
      </div>
    </div>`).join('');

  // 依棚別選擇燈光配置
  const FIXED_LIGHTS = isGreenStudio ? [
    {key:'G1', label:'G1 (200x)', group:'green'},
    {key:'G2', label:'G2 (200x)', group:'green'},
    {key:'G3', label:'G3 (200x)', group:'green'},
  ] : [
    {key:'A1', label:'A1 (360c)', group:'yellow'},
    {key:'A2', label:'A2 (360c)', group:'yellow'},
    {key:'B1', label:'B1 (300c)', group:'blue'},
    {key:'B2', label:'B2 (300c)', group:'blue'},
    {key:'C1', label:'C1 (200x)', group:'green'},
    {key:'C2', label:'C2 (200x)', group:'green'},
    {key:'C3', label:'C3 (200x)', group:'green'},
  ];
  const lightCount = FIXED_LIGHTS.length;
  // 確保 p.lights 有正確數量並對應 key
  FIXED_LIGHTS.forEach((def, i) => {
    if (!p.lights[i]) p.lights[i] = {};
    const l = p.lights[i];
    if (!l.key || l.key !== def.key) l.key = def.key;
    if (l.group === undefined || isGreenStudio) l.group = def.group;
    if (l.on === undefined) l.on = true;
    if (l.fixture === undefined) l.fixture = '';
    if (l.honeycomb === undefined) l.honeycomb = false;
    if (l.isRGB === undefined) l.isRGB = false;
  });
  // 只保留對應數量
  p.lights = p.lights.slice(0, lightCount);

  const FIXTURES = ['圓','方','球','傘','標'];
  const lightCards = p.lights.map((l, i) => {
    const def = FIXED_LIGHTS[i];
    const isOn = l.on !== false;
    const isRGB = l.isRGB || false;
    const group = def.group;
    const colorClass = `g-${group}`;
    const tagColor = group === 'yellow' ? 'c-yellow' : group === 'blue' ? 'c-blue' : 'c-green';
    const showHoneycomb = l.fixture === '圓' || l.fixture === '方';

    const fixtureButtons = FIXTURES.map(f =>
      `<button class="fixture-btn${l.fixture===f?' active':''}"
        onclick="setFixture(${p.id},${i},'${f}')">${f}</button>`
    ).join('');

    return `<div class="light-card ${colorClass}${isOn?' on':' off'}">
      <div class="light-card-top">
        <div class="lc-name-row">
          <button class="power-btn${isOn?' on':''}" onclick="togglePower(${p.id},${i})" title="${isOn?'關閉':'開啟'}燈光">⏻</button>
          <span class="light-card-name">${esc(def.label)}</span>
          <div class="rgb-toggle${isRGB?' on':''}" onclick="setLightRGB(${p.id},${i},${!isRGB})" title="RGB 模式">
            <span class="rgb-dot"></span>
            <span class="rgb-label">RGB</span>
          </div>
        </div>
      </div>
      ${isRGB ? `
      <div class="light-fields">
        <div class="lf"><label>H 色相</label><input value="${esc(l.intensity||'')}" placeholder="258"
          oninput="getP(${p.id}).lights[${i}].intensity=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"
          onchange="this.value=fmtH(this.value);getP(${p.id}).lights[${i}].intensity=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"></div>
        <div class="lf"><label>S 飽和</label><input value="${esc(l.kelvin||'')}" placeholder="58"
          oninput="getP(${p.id}).lights[${i}].kelvin=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"
          onchange="this.value=fmtS(this.value);getP(${p.id}).lights[${i}].kelvin=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"></div>
        <div class="lf"><label>I 亮度</label><input value="${esc(l.intensity2||'')}" placeholder="62"
          oninput="getP(${p.id}).lights[${i}].intensity2=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"
          onchange="this.value=fmtI(this.value);getP(${p.id}).lights[${i}].intensity2=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"></div>
        <div class="lf full"><label>備註</label><input value="${esc(l.note||'')}" placeholder="選填"
          oninput="getP(${p.id}).lights[${i}].note=this.value;debouncedSave(getP(${p.id}))"></div>
      </div>` : `
      <div class="light-fields">
        <div class="lf"><label>強度</label><input value="${esc(l.intensity||'')}" placeholder="80"
          oninput="getP(${p.id}).lights[${i}].intensity=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"
          onchange="this.value=fmtPct(this.value);getP(${p.id}).lights[${i}].intensity=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"></div>
        <div class="lf"><label>色溫</label><input value="${esc(l.kelvin||'')}" placeholder="4200"
          oninput="getP(${p.id}).lights[${i}].kelvin=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"
          onchange="this.value=fmtK(this.value);getP(${p.id}).lights[${i}].kelvin=this.value;updateTag(${p.id},${i});debouncedSave(getP(${p.id}))"></div>
        <div class="lf full"><label>備註</label><input value="${esc(l.note||'')}" placeholder="選填"
          oninput="getP(${p.id}).lights[${i}].note=this.value;debouncedSave(getP(${p.id}))"></div>
      </div>`}
      <div class="fixture-row">${fixtureButtons}</div>
      ${showHoneycomb ? `<div class="honeycomb-row">
        <label><input type="checkbox" ${l.honeycomb?'checked':''}
          onchange="setHoneycomb(${p.id},${i},this.checked)"> 蜂巢</label>
      </div>` : ''}
    </div>`;
  }).join('');

  return `<div class="panel active">
    <div class="sec-label">場景圖片 <span style="color:#555;font-size:10px;text-transform:none">← 左右滑動・第一張可拖移燈光標籤 →</span></div>
    <div class="gallery-slider" id="sceneSlider${p.id}">
      ${slides}
      <div class="gallery-add-slide" id="sceneDropZone${p.id}"
        onclick="document.getElementById('sceneFileAdd${p.id}').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="this.classList.remove('drag-over');dropFiles(event,'scene',${p.id})">
        <span>＋</span><span>拖放或點擊</span><span style="font-size:10px;color:#555">新增圖片</span>
      </div>
    </div>
    <input type="file" accept="image/*" multiple id="sceneFileAdd${p.id}" style="display:none"
      onchange="addSceneImgs(${p.id},this)">
    <div class="scene-caption">
      <input placeholder="圖說備註（例：展前佈光圖，最後更新 2026/04/23）" value="${esc(p.sceneCaption||'')}"
        oninput="getP(${p.id}).sceneCaption=this.value;debouncedSave(getP(${p.id}))">
    </div>
    <div class="panel-gap">
      <div class="sec-label">燈光設定</div>
      <div class="lights-grid">${lightCards}</div>
    </div>
  </div>`;
}

function renderCamera(p) {
  // 確保預設三台攝影機
  const DEFAULT_CAMS = ['Full','Guest','Host'];
  if (!p.cameras || p.cameras.length === 0) {
    p.cameras = DEFAULT_CAMS.map(name => ({name, note:'', aperture:'', shutter:'', iso:'', kelvin:'', img:null}));
  }

  const slides = p.cameras.map((c,i) => `
    <div class="cam-slide">
      <div class="cam-slide-img"
        onclick="document.getElementById('camFile${p.id}_${i}').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="this.classList.remove('drag-over');dropCamFile(event,${p.id},${i})">
        ${c.img
          ? `<img src="${c.img}"><span class="img-change-btn" onclick="event.stopPropagation();document.getElementById('camFile${p.id}_${i}').click()">更換圖片</span>`
          : `<div class="cam-img-hint"><span>＋</span><span>拖放或點擊上傳</span></div>`}
      </div>
      <input type="file" accept="image/*" id="camFile${p.id}_${i}" style="display:none" onchange="handleCamImg(${p.id},${i},this)">
      <div class="cam-slide-info">
        <div class="cam-slide-header">
          <input class="cam-slide-name" value="${esc(c.name)}"
            oninput="getP(${p.id}).cameras[${i}].name=this.value;debouncedSave(getP(${p.id}))">
          <button class="slide-del" onclick="removeCam(${p.id},${i})">✕</button>
        </div>
        <div class="cam-specs" style="grid-template-columns:repeat(4,1fr) 1.3fr 1.3fr">
          <div class="cam-spec"><label>焦段</label><input value="${esc(c.focal||'')}" placeholder="24mm"
            oninput="getP(${p.id}).cameras[${i}].focal=this.value;debouncedSave(getP(${p.id}))"></div>
          <div class="cam-spec"><label>光圈</label><input value="${esc(c.aperture||'')}" placeholder="F2.8"
            oninput="getP(${p.id}).cameras[${i}].aperture=this.value;debouncedSave(getP(${p.id}))"></div>
          <div class="cam-spec"><label>快門</label><input value="${esc(c.shutter||'')}" placeholder="1/60"
            oninput="getP(${p.id}).cameras[${i}].shutter=this.value;debouncedSave(getP(${p.id}))"></div>
          <div class="cam-spec"><label>ISO</label><input value="${esc(c.iso||'')}" placeholder="0db"
            oninput="getP(${p.id}).cameras[${i}].iso=this.value;debouncedSave(getP(${p.id}))"></div>
          <div class="cam-spec"><label>色溫</label><input value="${esc(c.kelvin||'')}" placeholder="4200K"
            oninput="getP(${p.id}).cameras[${i}].kelvin=this.value;debouncedSave(getP(${p.id}))"></div>
          <div class="cam-spec"><label>機型</label><input value="${esc(c.note||'')}" placeholder="SONY Z190"
            oninput="getP(${p.id}).cameras[${i}].note=this.value;debouncedSave(getP(${p.id}))"></div>
        </div>
      </div>
    </div>`).join('');

  return `<div class="panel active">
    <div class="sec-label">攝影機設定 <span style="color:#555;font-size:10px;text-transform:none">← 左右滑動 →</span></div>
    <div class="gallery-slider vertical" id="camSlider${p.id}">
      ${slides}
      <div class="gallery-add-slide"
        onclick="addCam(${p.id})"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')">
        <span>＋</span><span>新增攝影機</span>
      </div>
    </div>
  </div>`;
}

function renderOnair(p) {
  if (!p.onairImgs) p.onairImgs = p.onairImg ? [{src:p.onairImg,label:'Full',shot:''}] : [];
  // 確保預設三張
  if (p.onairImgs.length === 0) {
    p.onairImgs = [{src:null,label:'Full',shot:''},{src:null,label:'Guest',shot:''},{src:null,label:'Host',shot:''}];
  }

  const SHOTS = ['全景','中景','特寫'];

  const slides = p.onairImgs.map((img,i) => `
    <div class="onair-slide">
      <div class="onair-slide-img"
        onclick="document.getElementById('onairFile${p.id}_${i}').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="this.classList.remove('drag-over');dropOnairFile(event,${p.id},${i})">
        ${img.src
          ? `<img src="${img.src}"><span class="img-change-btn" onclick="event.stopPropagation();document.getElementById('onairFile${p.id}_${i}').click()">更換圖片</span>`
          : `<div class="onair-hint"><span>🎬</span><span>拖放或點擊上傳</span></div>`}
      </div>
      <input type="file" accept="image/*" id="onairFile${p.id}_${i}" style="display:none"
        onchange="handleOnairImg(${p.id},${i},this)">
      <div class="onair-slide-info">
        <div class="onair-slide-header">
          <input class="onair-slide-name" value="${esc(img.label||'')}" placeholder="名稱"
            oninput="getP(${p.id}).onairImgs[${i}].label=this.value;debouncedSave(getP(${p.id}))"
            onclick="event.stopPropagation()">
          <button class="slide-del" onclick="removeOnairImg(${p.id},${i})">✕</button>
        </div>
        <div class="shot-type-row">
          ${SHOTS.map(s=>`<button class="shot-btn${img.shot===s?' active':''}"
            onclick="event.stopPropagation();getP(${p.id}).onairImgs[${i}].shot='${img.shot===s?'':s}';debouncedSave(getP(${p.id}));renderMain()">${s}</button>`).join('')}
        </div>
      </div>
    </div>`).join('');

  return `<div class="panel active">
    <div class="sec-label">上線畫面 <span style="color:#555;font-size:10px;text-transform:none">← 左右滑動 →</span></div>
    <div class="gallery-slider vertical" id="onairSlider${p.id}">

      oninput="getP(${p.id}).onairNote=this.value;debouncedSave(getP(${p.id}))">${esc(p.onairNote)}</textarea>
  </div>`;
}

// ── IMAGE COMPRESS ──
function compressImg(file, maxW, quality) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ── CLOUDINARY UPLOAD ──
async function uploadToCloud(base64) {
  const fd = new FormData();
  fd.append('file', base64);
  fd.append('upload_preset', CLD_PRESET);
  fd.append('folder', 'dt-studio');
  const res = await fetch(CLD_URL, { method: 'POST', body: fd });
  if (!res.ok) throw new Error('Cloudinary 上傳失敗 ' + res.status);
  const data = await res.json();
  return data.secure_url;
}

async function handleImg(id, field, input) {
  const file = input.files[0]; if (!file) return;
  setSyncStatus('saving', '上傳圖片中…');

    const url = await uploadToCloud(base64);
    const p = getP(id); p[field] = url;

}

// ── LIGHT VALUE FORMATTERS ──
// 輸入純數字自動補單位，已有單位則保留原樣
function fmtPct(v) {
  v = v.trim(); if (!v) return v;
  return /^\d+(\.\d+)?$/.test(v) ? v + '%' : v;
}
function fmtK(v) {
  v = v.trim(); if (!v) return v;
  return /^\d+(\.\d+)?$/.test(v) ? v + 'K' : v;
}
function fmtH(v) {
  v = v.trim(); if (!v) return v;
  return /^\d+(\.\d+)?$/.test(v) ? 'H' + v : v;
}
function fmtS(v) {
  v = v.trim(); if (!v) return v;
  return /^\d+(\.\d+)?$/.test(v) ? 'S' + v : v;
}
function fmtI(v) {
  v = v.trim(); if (!v) return v;
  // 純數字 → I62%；已有 I 前綴 → 補 %；已完整 → 原樣
  if (/^\d+(\.\d+)?$/.test(v)) return 'I' + v + '%';
  if (/^[Ii]\d+(\.\d+)?$/.test(v)) return v.toUpperCase() + '%';
  return v;
}

// ── ONAIR / CAM HELPERS ──
function addOnairSlide(id) {
  const p = getP(id);
  if (!p.onairImgs) p.onairImgs = [];
  // 智慧命名：找最後一個名稱的基底，遞增編號
  const BASE = ['Full','Guest','Host'];
  const last = p.onairImgs[p.onairImgs.length - 1];
  let newLabel = 'Full';
  if (last && last.label) {
    // 嘗試找 base 名
    const match = last.label.match(/^(.+?)(\s*\d+)?$/);
    const base = match ? match[1].trim() : last.label;
    const count = p.onairImgs.filter(s => (s.label||'').startsWith(base)).length;
    newLabel = `${base} ${count + 1}`;
  }
  p.onairImgs.push({ src: null, label: newLabel, shot: '' });
  renderMain(); saveProgram(p);
}

async function handleOnairImg(id, idx, input) {

async function dropOnairNew(event, id) {

    const url = await uploadToCloud(base64);
    p.onairImgs.push({ src: url, label: '', shot: '' });

  renderMain(); saveProgram(p);
}

function updateTag(pid,idx){

// ── DRAG TAGS ──
function startDrag(e,pid,idx){if(e.target.getAttribute('contenteditable')==='true')return;e.preventDefault();dragging={pid,idx};const tag=document.getElementById(`ltag-${idx}`),rect=tag.getBoundingClientRect();dragOffX=e.clientX-rect.left;dragOffY=e.clientY-rect.top;}
function startTouchDrag(e,pid,idx){if(e.target.getAttribute('contenteditable')==='true')return;const t=e.touches[0];dragging={pid,idx};const tag=document.getElementById(`ltag-${idx}`),rect=tag.getBoundingClientRect();dragOffX=t.clientX-rect.left;dragOffY=t.clientY-rect.top;}
function moveDraggingTag(cx,cy){
  const zone=document.getElementById(`sceneZone${dragging.pid}_0`);if(!zone)return;
  const zr=zone.getBoundingClientRect(),tag=document.getElementById(`ltag-${dragging.idx}`);
  const leftPx=Math.max(0,Math.min(cx-zr.left-dragOffX, zr.width -tag.offsetWidth));
  const topPx =Math.max(0,Math.min(cy-zr.top -dragOffY, zr.height-tag.offsetHeight));
  const leftPct=parseFloat((leftPx/zr.width *100).toFixed(3));
  const topPct =parseFloat((topPx /zr.height*100).toFixed(3));
  tag.style.left=leftPct+'%'; tag.style.top=topPct+'%';
  const p=getP(dragging.pid);if(!p.sceneTagPos)p.sceneTagPos={};
  p.sceneTagPos[dragging.idx]={leftPct,topPct};
}

// 標籤超出邊界時自動夾回（支援百分比與舊的 px 格式）
function clampTags(pid) {
  const zone=document.getElementById(`sceneZone${pid}_0`);if(!zone)return;
  const p=getP(pid);if(!p||!p.sceneTagPos)return;
  const zw=zone.offsetWidth,zh=zone.offsetHeight;if(!zw||!zh)return;
  let changed=false;
  Object.keys(p.sceneTagPos).forEach(i=>{
    const tag=document.getElementById(`ltag-${i}`);if(!tag)return;
    const tw=tag.offsetWidth,th=tag.offsetHeight;
    const pos=p.sceneTagPos[i];
    // 舊格式（px）升級到百分比
    if(typeof pos.leftPct!=='number'){
      const lp=parseFloat(pos.left||'0')/zw*100;
      const tp=parseFloat(pos.top||'0')/zh*100;
      pos.leftPct=parseFloat(Math.min(lp,(zw-tw)/zw*100).toFixed(3));
      pos.topPct =parseFloat(Math.min(tp,(zh-th)/zh*100).toFixed(3));
      delete pos.left; delete pos.top;
      tag.style.left=pos.leftPct+'%'; tag.style.top=pos.topPct+'%';
      changed=true; return;
    }
    const maxLpct=(zw-tw)/zw*100;
    const maxTpct=(zh-th)/zh*100;
    const nl=Math.max(0,Math.min(pos.leftPct,maxLpct));
    const nt=Math.max(0,Math.min(pos.topPct, maxTpct));
    if(nl!==pos.leftPct||nt!==pos.topPct){
      pos.leftPct=parseFloat(nl.toFixed(3)); pos.topPct=parseFloat(nt.toFixed(3));
      tag.style.left=pos.leftPct+'%'; tag.style.top=pos.topPct+'%';
      changed=true;
    }
  });
  if(changed)debouncedSave(p);
}
document.addEventListener('mousemove',e=>{if(dragging)moveDraggingTag(e.clientX,e.clientY);});
document.addEventListener('mouseup',()=>{if(dragging){saveProgram(getP(dragging.pid));dragging=null;}});
document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();moveDraggingTag(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
document.addEventListener('touchend',()=>{if(dragging){saveProgram(getP(dragging.pid));dragging=null;}});

// ── NAV DRAG ──
function navClick(e,id){if(e.target.classList.contains('drag-handle'))return;activeId=id;activeTab='scene';render();}
function navDragStart(e,id){
  navDraggingId=id;
  e.currentTarget.classList.add('dragging-item');
  e.dataTransfer.effectAllowed='move';
}
function navDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function navDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function navDrop(e,tid){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(navDraggingId===tid)return;
  const fi=programs.findIndex(p=>p.id===navDraggingId),ti=programs.findIndex(p=>p.id===tid);
  if(fi<0||ti<0)return;
  const[moved]=programs.splice(fi,1);programs.splice(ti,0,moved);
  renderNav();saveOrder();
}
function navDragEnd(){
  navDraggingId=null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('dragging-item','drag-over'));
  document.querySelectorAll('.nav-category').forEach(el=>el.classList.remove('drop-active'));
}
