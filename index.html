<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIGITIMES STUDIO | 場記表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #222426;
  --bg1: #2c2e31;
  --bg2: #363739;
  --bg3: #404244;
  --bg4: #4c4e50;
  --border: rgba(255,255,255,0.10);
  --border-md: rgba(255,255,255,0.18);
  --text-primary: #e8e8e6;
  --text-secondary: #888885;
  --text-hint: #555552;
  --orange: #d4711a;
  --orange-dim: rgba(212,113,26,0.18);
  --orange-glow: rgba(212,113,26,0.35);
  --green: #3a7d44;
  --green-dim: rgba(58,125,68,0.2);
  --blue: #1a5c8c;
  --blue-dim: rgba(26,92,140,0.2);
  --amber: #b87a12;
  --amber-dim: rgba(184,122,18,0.2);
  --slate: #4a5568;
  --slate-dim: rgba(74,85,104,0.2);
  --red-ng: #c0392b;
  --red-dim: rgba(192,57,43,0.2);
  --radius: 6px;
  --radius-lg: 10px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg0); color: var(--text-primary); font-family: var(--sans); font-size: 14px; overscroll-behavior: none; }

/* ── HEADER ── */
#header {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
#header-inner {
  max-width: 560px;
  margin: 0 auto;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#header .logo {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--orange);
  letter-spacing: 0.04em;
  font-weight: 500;
  line-height: 1;
}
#header .sep { width: 1px; height: 18px; background: var(--border-md); align-self: center; }
#header .title-text { font-size: 14px; font-weight: 500; color: var(--text-primary); letter-spacing: 0.02em; line-height: 1; }
#header .spacer { flex: 1; }
#header .date-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  white-space: nowrap;
}

/* ── LAYOUT ── */
#app { padding: 10px 14px 24px; display: flex; flex-direction: column; gap: 8px; max-width: 560px; margin: 0 auto; }

/* ── CARD ── */
.card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
}
.card-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #a8a8a5;
  font-family: var(--mono);
  font-weight: 500;
  margin-bottom: 10px;
}

/* ── TIMER ROW ── */
.timer-row { display: flex; align-items: center; gap: 8px; }
#timer {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--text-secondary);
  flex: 1;
  transition: color 0.3s;
}
#timer.on { color: var(--orange); text-shadow: 0 0 20px var(--orange-glow); }
.roll-btn {
  background: var(--green);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  padding: 9px 14px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
}
.stop-btn {
  background: var(--red-ng);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  padding: 9px 14px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
}
.roll-btn:active, .stop-btn:active { opacity: 0.75; }

/* prevent iOS auto-zoom on input focus */
input, select, textarea { font-size: 16px !important; }

/* ── META GRID ── */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; letter-spacing: 0.05em; color: #a8a8a5; font-family: var(--mono); text-transform: uppercase; font-weight: 500; }
.field input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 16px;
  font-family: var(--sans);
  padding: 7px 9px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--border-md); }
.field input::placeholder { color: var(--text-hint); }

/* Timecode field — green accent */
.tc-field-wrap { display: flex; flex-direction: column; gap: 4px; }
.tc-field-wrap label { font-size: 11px; letter-spacing: 0.05em; color: #5ecf80; font-family: var(--mono); text-transform: uppercase; font-weight: 500; }
.tc-inner { display: flex; gap: 4px; }
.tc-inner input {
  flex: 1;
  background: #0d2218;
  border: 1px solid #2d6e4a;
  border-radius: var(--radius);
  color: #5ecf80;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
  padding: 7px 9px;
  outline: none;
  letter-spacing: 0.05em;
}
.tc-inner input:focus { border-color: #4db87a; }
.tc-inner input::placeholder { color: #2d6e4a; }

/* ── NG TYPE BUTTONS ── */
.type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.tbtn {
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text-secondary);
  font-size: 11px;
  font-family: var(--sans);
  font-weight: 500;
  padding: 9px 4px 8px;
  text-align: center;
  cursor: pointer;
  line-height: 1.4;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.tbtn .ticon { font-size: 16px; display: block; }
.tbtn:active { transform: scale(0.96); }

/* type colours */
.tbtn.t0 { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.tbtn.t1 { border-color: #e24b4a; color: #e24b4a; background: var(--red-dim); }
.tbtn.t2 { border-color: #185fa5; color: #7ab0e0; background: var(--blue-dim); }
.tbtn.t3 { border-color: #5f5e5a; color: #9a9993; background: var(--slate-dim); }

/* unselected dims */
.tbtn.unsel { opacity: 0.38; border-color: var(--border) !important; background: var(--bg2) !important; color: var(--text-hint) !important; }

/* ── FIELDS ROW ── */
.fields-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
.tc-wrap { display: flex; gap: 4px; }
.tc-wrap input { flex: 1; }
.grab-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--orange);
  font-size: 16px;
  padding: 0 10px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.grab-btn:active { background: var(--orange-dim); }

.photo-box {
  border: 1px dashed var(--border-md);
  border-radius: var(--radius);
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  min-height: 56px;
  transition: border-color 0.15s;
}
.photo-box:active { border-color: var(--orange); }
.photo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ph-placeholder { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-hint); font-size: 11px; }
.ph-placeholder .ph-icon { font-size: 20px; }
#photo-input { display: none; }

.note-inp {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 16px;
  font-family: var(--sans);
  padding: 7px 9px;
  outline: none;
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.note-inp:focus { border-color: var(--border-md); }
.note-inp::placeholder { color: var(--text-hint); }

/* ── REC BUTTON ── */
.rec-btn {
  width: 100%;
  background: var(--red-ng);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 0.08em;
  padding: 13px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: opacity 0.15s;
}
.rec-btn:active { opacity: 0.82; }
.rec-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
  pointer-events: none;
}

/* ── LOG SECTION ── */
.log-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.log-count { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); flex: 1; }
.hbtn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--sans);
  padding: 5px 10px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.hbtn:hover { background: var(--bg3); color: var(--text-primary); }
.hbtn.orange { color: var(--orange); border-color: var(--orange-dim); }

.log-empty { font-size: 13px; color: var(--text-hint); text-align: center; padding: 16px 0; font-family: var(--mono); }

.log-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 6px;
  align-items: start;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.log-item:last-child { border-bottom: none; }
.log-num { font-family: var(--mono); font-size: 11px; color: var(--text-hint); padding-top: 2px; }
.log-main { display: flex; flex-direction: column; gap: 3px; }
.log-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.log-roll { font-family: var(--mono); font-size: 11px; color: var(--orange); background: var(--orange-dim); border: 1px solid rgba(212,113,26,0.3); border-radius: 3px; padding: 1px 5px; }
.log-tc { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text-primary); }
.log-ppt { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); }
.log-badge { font-size: 11px; padding: 1px 8px; border-radius: 20px; font-weight: 500; }
.lb0 { background: var(--amber-dim); color: #d4a843; border: 1px solid rgba(184,122,18,0.3); }
.lb1 { background: var(--red-dim); color: #e06b6a; border: 1px solid rgba(192,57,43,0.3); }
.lb2 { background: var(--blue-dim); color: #7ab0e0; border: 1px solid rgba(26,92,140,0.3); }
.lb3 { background: var(--slate-dim); color: #888885; border: 1px solid rgba(74,85,104,0.3); }
.log-thumb { width: 72px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); cursor: zoom-in; display: block; margin-top: 4px; }

/* ── LIGHTBOX ── */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center;
  cursor: zoom-out;
}
#lightbox.on { display: flex; }
#lightbox img { max-width: 94vw; max-height: 88vh; border-radius: 8px; object-fit: contain; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
.log-note { font-size: 12px; color: var(--text-secondary); font-style: italic; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 16px; padding: 0 2px; transition: color 0.12s; }
.del-btn:hover { color: var(--red-ng); }

/* ── FLASH OVERLAY ── */
#flash-overlay {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
#flash-overlay.fire { animation: flashBg 0.65s ease-out forwards; }
@keyframes flashBg {
  0%   { opacity: 0; background: rgba(0,0,0,0); }
  12%  { opacity: 1; background: rgba(255,255,255,0.12); }
  40%  { opacity: 1; background: rgba(0,0,0,0); }
  100% { opacity: 0; }
}
#flash-icon {
  font-size: 88px;
  opacity: 0;
  transform: scale(0.3);
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));
}
#flash-overlay.fire #flash-icon {
  animation: iconBurst 0.6s cubic-bezier(0.18, 1.5, 0.4, 1) forwards;
}
@keyframes iconBurst {
  0%   { opacity: 0; transform: scale(0.3); }
  25%  { opacity: 1; transform: scale(1.2); }
  55%  { opacity: 1; transform: scale(1.0); }
  80%  { opacity: 1; transform: scale(1.0); }
  100% { opacity: 0; transform: scale(1.1); }
}

/* picker inputs */
#session-picker input {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary);
  font-size: 16px; padding: 8px 10px; outline: none; display: block; width: 100%;
}
#session-picker input::placeholder { color: var(--text-hint); }
#session-picker.on { display: block !important; }

body { position: relative; }
#ss-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 300;
  background: rgba(0,0,0,0.82);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}
#ss-modal.on { display: block; }
#ss-card {
  background: #1e2022;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-lg);
  padding: 16px;
  max-width: 560px;
  margin: 0 auto;
  margin-top: 20px;
}
.ss-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 12px;
  margin-bottom: 12px;
}
.ss-proj { font-size: 15px; font-weight: 500; color: var(--text-primary); }
.ss-sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; font-family: var(--mono); }
.ss-close-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
}
.ss-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.ss-table th {
  background: var(--bg2);
  padding: 6px 7px;
  text-align: left;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-md);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.ss-table td {
  padding: 7px 7px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  color: var(--text-primary);
}
.ss-table tr:last-child td { border-bottom: none; }
.ss-thumb { width: 64px; height: 44px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); cursor: zoom-in; }
.ss-tip { font-size: 11px; color: var(--text-hint); text-align: center; margin-top: 12px; font-family: var(--mono); }
.ss-export-btn {
  width: 100%;
  background: var(--green);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--mono);
  letter-spacing: 0.05em;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}
.ss-export-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<!-- SESSION PICKER MODAL -->
<div id="session-picker" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);padding:16px;overflow-y:auto;">
  <div style="background:var(--bg1);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:16px;max-width:480px;margin:20px auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px">
      <div>
        <div style="font-size:15px;font-weight:500;color:var(--text-primary)">選擇場次</div>
        <div style="font-size:11px;color:var(--text-secondary);font-family:var(--mono);margin-top:2px" id="picker-date">—</div>
      </div>
      <button onclick="document.getElementById('session-picker').classList.remove('on')"
        style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);font-size:12px;padding:5px 10px;cursor:pointer">✕ 關閉</button>
    </div>
    <div id="session-list" style="margin-bottom:12px"></div>
    <div style="border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:11px;color:var(--text-hint);margin-bottom:8px;font-family:var(--mono)">── 建立新場次 ──</div>
      <input id="picker-proj" placeholder="專案名稱" style="width:100%;margin-bottom:6px">
      <input id="picker-spk"  placeholder="講者" style="width:100%;margin-bottom:10px">
      <button onclick="createFromPicker()"
        style="width:100%;background:var(--green);border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:500;padding:11px;cursor:pointer;font-family:var(--mono)">
        ＋ 開始新場次
      </button>
    </div>
  </div>
</div>

<div id="flash-overlay"><div id="flash-icon"></div></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="PPT 大圖"></div>

<div id="ss-modal">
  <div id="ss-card">
    <div class="ss-head">
      <div>
        <div class="ss-proj" id="ss-proj">—</div>
        <div class="ss-sub" id="ss-sub">—</div>
      </div>
      <button class="ss-close-btn" onclick="closeModal()">✕ 關閉</button>
    </div>
    <table class="ss-table">
      <thead>
        <tr>
          <th style="width:24px">#</th>
          <th style="width:80px">Timecode</th>
          <th style="width:44px">PPT</th>
          <th style="width:72px">照片</th>
          <th colspan="2">NG 類型</th>
        </tr>
      </thead>
      <tbody id="ss-tbody"></tbody>
    </table>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="ss-export-btn" onclick="exportSRT()" style="background:var(--orange)">↓ 匯出 SRT（Premiere）</button>
      <button class="ss-export-btn" onclick="exportCSV()" style="background:var(--green);flex:0 0 auto;width:auto;padding:10px 14px">↓ CSV</button>
    </div>
  </div>
</div>

<div id="header">
  <div id="header-inner">
    <div class="logo">DIGITIMES STUDIO</div>
    <div class="sep"></div>
    <div class="title-text">場記表</div>
    <div class="spacer"></div>
    <div id="sync-status" style="font-family:var(--mono);font-size:10px;color:var(--text-hint);max-width:90px;text-align:right;line-height:1.3;">連線中…</div>
    <button onclick="openPicker()" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--orange);font-size:11px;padding:4px 9px;cursor:pointer;font-family:var(--mono);white-space:nowrap">⇄ 場次</button>
    <div class="date-tag" id="date-tag">—</div>
  </div>
</div>

<div id="app">

  <!-- TIMER CARD -->
  <div class="card">
    <div class="timer-row">
      <div id="timer">00:00:00</div>
      <button class="roll-btn" onclick="startTimer()">▶ ROLL</button>
      <button class="stop-btn" onclick="stopTimer()">■ STOP</button>
    </div>
    <div class="meta-grid">
      <div class="field">
        <label>專案名稱</label>
        <input id="proj" placeholder="Webinar 標題">
      </div>
      <div class="field">
        <label>講者</label>
        <input id="spk" placeholder="姓名">
      </div>
    </div>
  </div>

  <!-- NG FORM CARD -->
  <div class="card">
    <div class="card-label">記錄 NG</div>

    <!-- TYPE SELECT -->
    <div class="type-grid" id="type-grid">
      <button class="tbtn t0" id="ty0" onclick="pickType(0)">
        <span class="ticon">🔄</span>重來
      </button>
      <button class="tbtn t1" id="ty1" onclick="pickType(1)">
        <span class="ticon">🖥</span>PPT調整
      </button>
      <button class="tbtn t2" id="ty2" onclick="pickType(2)">
        <span class="ticon">🎙</span>Mic雜音
      </button>
      <button class="tbtn t3" id="ty3" onclick="pickType(3)">
        <span class="ticon">🚨</span>現場狀況
      </button>
    </div>

    <!-- CAM + TC -->
    <div class="fields-2">
      <div class="field">
        <label>檔號 CAM</label>
        <input id="f-roll" type="number" min="1" placeholder="CAM #">
      </div>

    <!-- PPT PAGE + PHOTO -->
    <div class="fields-2" style="margin-bottom:8px">
      <div class="field">

</div><!-- /app -->

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAA_lBeMcU_MHwBIakycWMY1qVFQpNFlLw",
  authDomain: "dt-studio-5bb2b.firebaseapp.com",
  projectId: "dt-studio-5bb2b",
  storageBucket: "dt-studio-5bb2b.firebasestorage.app",
  messagingSenderId: "453498810482",
  appId: "1:453498810482:web:265ae1a1aac433355e52eb"
};
const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

let unsubscribe = null; // Firestore listener

const TYPES = ['重來','PPT調整','Mic雜音','現場狀況'];
const FLASH_ICONS = ['🔄','🖥','🎙','🚨'];
const BADGE_CLS = ['lb0','lb1','lb2','lb3'];
const SS_BADGE_COLORS = [
  'background:#3a2e0a;color:#d4a843;border:1px solid rgba(184,122,18,.4)',
  'background:#3a1212;color:#e06b6a;border:1px solid rgba(192,57,43,.4)',
  'background:#0e1e2e;color:#7ab0e0;border:1px solid rgba(26,92,140,.4)',
  'background:#1e1e1e;color:#888885;border:1px solid rgba(74,85,104,.4)',
];

let elapsed = 0, running = false, tint = null;
let logs = [], selType = 0, photoData = null;

function pad(n){ return String(n).padStart(2,'0') }
function s2tc(s){ return pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60) }

// Date header
const now = new Date();
document.getElementById('date-tag').textContent =
  now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});

// Timer
function startTimer(){
  if(running) return;
  running = true;
  document.getElementById('timer').classList.add('on');
  tint = setInterval(()=>{ elapsed++; document.getElementById('timer').textContent = s2tc(elapsed); }, 1000);
}
function stopTimer(){
  if(!running) return;
  running = false;
  clearInterval(tint);
  elapsed = 0;
  document.getElementById('timer').textContent = '00:00:00';
  document.getElementById('timer').classList.remove('on');
  // CAM 自動 +1
  const camEl = document.getElementById('f-roll');
  const cur = parseInt(camEl.value) || 0;
  if(cur > 0) camEl.value = cur + 1;
  // 清空 PPT 頁數
  document.getElementById('f-ppt').value = '';
}
function grabTC(){
  document.getElementById('f-tc').value = s2tc(elapsed);
}

// Type select
function pickType(i){
  selType = i;
  for(let j=0;j<4;j++){
    const b = document.getElementById('ty'+j);
    if(j===i){ b.classList.remove('unsel'); }
    else { b.classList.add('unsel'); }
  }
}
pickType(0); // default 重來

// Photo
function onPhoto(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    photoData = ev.target.result;
    document.getElementById('photo-box').innerHTML = '<img src="'+photoData+'" alt="PPT">';
  };
  r.readAsDataURL(f);
}

// Flash
function fireFlash(type){
  const ov = document.getElementById('flash-overlay');
  const ic = document.getElementById('flash-icon');
  ic.textContent = FLASH_ICONS[type];
  ov.classList.remove('fire');
  void ov.offsetWidth;
  ov.classList.add('fire');
  setTimeout(()=>ov.classList.remove('fire'), 700);
}

// ── FIRESTORE SYNC — 專案為 session key ──────────────────────
// Structure: ng-sessions/{YYYY-MM-DD}/{sessionId}/logs/{id}
// sessionId = sanitised project name, stored with proj+spk metadata

const TODAY = now.toISOString().slice(0,10); // "2026-05-12"
let SESSION_ID = ''; // set when user enters proj name or picks from list
let unsubListener = null;

function setStatus(msg){
  const el = document.getElementById('sync-status');
  if(el) el.textContent = msg;
}

function sanitize(str){ return str.trim().replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g,'_').slice(0,40) || 'unnamed'; }

// ── SESSION PICKER (shown on PC / when no active session) ────
async function openPicker(){
  document.getElementById('picker-date').textContent = TODAY;
  await loadSessionPicker();
}

async function createFromPicker(){
  const proj = document.getElementById('picker-proj').value.trim();
  const spk  = document.getElementById('picker-spk').value.trim();
  if(!proj){ alert('請輸入專案名稱'); return; }
  document.getElementById('proj').value = proj;
  document.getElementById('spk').value  = spk;
  document.getElementById('session-picker').classList.remove('on');
  await startNewSession();
}

async function loadSessionPicker(){
  const snap = await getDocs(collection(db, 'ng-sessions', TODAY, '__meta__')).catch(()=>null);
  const sessions = snap ? snap.docs.map(d=>d.data()) : [];
  const list = document.getElementById('session-list');
  if(sessions.length === 0){
    list.innerHTML = '<div style="color:var(--text-hint);font-size:13px;text-align:center;padding:12px 0">今天尚無場次紀錄</div>';
  } else {
    list.innerHTML = sessions
      .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
      .map(s=>`
        <button onclick="selectSession('${s.id}','${s.proj}','${s.spk||''}')"
          style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
                 padding:10px 12px;text-align:left;cursor:pointer;margin-bottom:6px;color:var(--text-primary);display:block">
          <div style="font-size:13px;font-weight:500;color:var(--text-primary)">${s.proj||'未命名'}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;font-family:var(--mono)">
            ${s.spk?'講者：'+s.spk+'　':''}${s.count||0} 筆 NG
          </div>
        </button>`).join('');
  }
  document.getElementById('session-picker').classList.add('on');
}

function selectSession(sid, proj, spk){
  document.getElementById('session-picker').classList.remove('on');
  document.getElementById('proj').value = decodeURIComponent(proj)||'';
  document.getElementById('spk').value  = decodeURIComponent(spk)||'';
  bindSession(sid);
}

function bindSession(sid){
  if(unsubListener){ unsubListener(); unsubListener = null; }
  SESSION_ID = sid;
  logs = [];
  renderLogs();
  if(!sid){ setStatus('未連線'); return; }
  setStatus('連線中…');
  const q = query(
    collection(db, 'ng-sessions', TODAY, sid, 'logs'),
    orderBy('id','desc')
  );
  unsubListener = onSnapshot(q, snap => {
    const photoMap = {};
    logs.forEach(l => { if(l.photo) photoMap[l.id] = l.photo; });
    logs = snap.docs.map(d => {
      const data = d.data();
      if(photoMap[data.id]) data.photo = photoMap[data.id];
      return data;
    });
    renderLogs();
    setStatus('✓ '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  }, err => { setStatus('⚠ 離線'); console.error(err); });
}

async function startNewSession(){
  const proj = document.getElementById('proj').value.trim();
  const spk  = document.getElementById('spk').value.trim();
  if(!proj){ alert('請先輸入專案名稱'); document.getElementById('proj').focus(); return; }
  const sid = sanitize(proj);
  // write metadata
  await setDoc(doc(db, 'ng-sessions', TODAY, '__meta__', sid),
    { id: sid, proj, spk, count: 0, createdAt: Date.now() });
  bindSession(sid);
  setStatus('新場次已建立');
}

async function updateMetaCount(){
  if(!SESSION_ID) return;
  const proj = document.getElementById('proj').value.trim();
  const spk  = document.getElementById('spk').value.trim();
  await setDoc(doc(db, 'ng-sessions', TODAY, '__meta__', SESSION_ID),
    { id:SESSION_ID, proj, spk, count: logs.length, createdAt: Date.now() }, {merge:true});
}

// Add NG
async function addNG(){
  if(!SESSION_ID){
    const proj = document.getElementById('proj').value.trim();
    if(!proj){ alert('請先輸入專案名稱'); document.getElementById('proj').focus(); return; }
    await startNewSession();
  }
  const tc   = document.getElementById('f-tc').value.trim() || s2tc(elapsed);
  const roll = document.getElementById('f-roll').value.trim();
  const ppt  = document.getElementById('f-ppt').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const proj = document.getElementById('proj').value.trim();
  const spk  = document.getElementById('spk').value.trim();
  const id   = Date.now();

  document.getElementById('f-tc').value   = '';
  document.getElementById('f-ppt').value  = '';
  document.getElementById('f-note').value = '';
  const savedPhoto = photoData;
  photoData = null;
  document.getElementById('photo-box').innerHTML =
    '<div class="ph-placeholder"><span class="ph-icon">📷</span><span>拍照 / 選圖</span></div>';
  document.getElementById('photo-input').value = '';

  fireFlash(selType);

  await setDoc(
    doc(db, 'ng-sessions', TODAY, SESSION_ID, 'logs', String(id)),
    { tc, roll, ppt, note, type: selType, id, proj, spk }
  );
  await updateMetaCount();

  if(savedPhoto){
    const match = logs.find(l=>l.id===id);
    if(match){ match.photo = savedPhoto; renderLogs(); }
  }
}

async function delLog(id){
  if(!SESSION_ID) return;
  await deleteDoc(doc(db, 'ng-sessions', TODAY, SESSION_ID, 'logs', String(id)));
  await updateMetaCount();
}

async function clearAll(){
  if(!logs.length) return;
  if(!confirm('確定清空此場次所有 NG 紀錄？')) return;
  await Promise.all(logs.map(l=>
    deleteDoc(doc(db, 'ng-sessions', TODAY, SESSION_ID, 'logs', String(l.id)))
  ));
  await updateMetaCount();
}

// On load: auto-bind if proj already filled, else show picker
window.addEventListener('DOMContentLoaded', ()=>{});
(async ()=>{
  const proj = document.getElementById('proj').value.trim();
  if(proj){ await startNewSession(); }
  else { await loadSessionPicker(); }
})();


function renderLogs(){
  document.getElementById('log-count').textContent = 'NG 紀錄 '+logs.length+' 筆';
  const el = document.getElementById('log-list');
  if(!logs.length){ el.innerHTML='<div class="log-empty">— 尚無紀錄 —</div>'; return; }
  el.innerHTML = logs.map((l,i)=>`
    <div class="log-item">
      <span class="log-num">#${logs.length-i}</span>
      <div class="log-main">
        <div class="log-top">
          ${l.roll ? `<span class="log-roll">CAM${l.roll}</span>` : ''}
          <span class="log-tc">${l.tc}</span>
          ${l.ppt ? `<span class="log-ppt">p.${l.ppt}</span>` : ''}
          <span class="log-badge ${BADGE_CLS[l.type]}">${TYPES[l.type]}</span>
        </div>
        ${l.photo ? `<img class="log-thumb" src="${l.photo}" alt="PPT" onclick="openLightbox('${l.photo}')">` : ''}
        ${l.note ? `<div class="log-note">${l.note}</div>` : ''}
      </div>
      <button class="del-btn" onclick="delLog(${l.id})" aria-label="刪除">✕</button>
    </div>
  `).join('');
}

// Screenshot modal — grouped by CAM

  const groups = {};

function closeModal(){ document.getElementById('ss-modal').classList.remove('on'); }


// ── EXPORT HELPERS ──────────────────────────────────────────
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

// Download on desktop; show share sheet on iOS
function triggerDownload(content, filename, mime){
  if(isIOS()){
    // iOS: use Web Share API if available, else show in-app viewer
    const file = new File([content], filename, {type: mime});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({ files:[file], title: filename })
        .catch(()=> showExportViewer(content, filename));
    } else {
      showExportViewer(content, filename);
    }
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content],{type:mime+';charset=utf-8'}));
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  }
}

// In-app viewer for iOS fallback — shows content in a modal with copy button
function showExportViewer(content, filename){
  let viewer = document.getElementById('export-viewer');
  if(!viewer){
    viewer = document.createElement('div');
    viewer.id = 'export-viewer';
    viewer.style.cssText = 'position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;padding:16px;gap:10px;';
    viewer.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span id="ev-filename" style="font-family:monospace;font-size:13px;color:#d4711a"></span>
        <button onclick="document.getElementById('export-viewer').style.display='none'"
          style="background:#333;border:1px solid #555;color:#ccc;border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer">✕ 關閉</button>
      </div>
      <button id="ev-copy"
        style="background:#1D9E75;border:none;color:#fff;border-radius:6px;padding:10px;font-size:14px;font-weight:500;cursor:pointer">
        複製全部內容
      </button>
      <textarea id="ev-content" readonly
        style="flex:1;background:#1c1d1f;border:1px solid #333;border-radius:6px;color:#e8e8e6;font-family:monospace;font-size:12px;padding:10px;resize:none;-webkit-user-select:text;user-select:text;"></textarea>
      <p style="font-size:11px;color:#666;text-align:center">複製後貼到記事本，存成 .srt 或 .csv 檔</p>`;
    document.body.appendChild(viewer);
    document.getElementById('ev-copy').onclick = ()=>{
      const ta = document.getElementById('ev-content');
      ta.select(); ta.setSelectionRange(0,99999);
      navigator.clipboard ? navigator.clipboard.writeText(ta.value).then(()=>{
        document.getElementById('ev-copy').textContent='✓ 已複製！';
        setTimeout(()=>document.getElementById('ev-copy').textContent='複製全部內容',2000);
      }) : document.execCommand('copy');
    };
  }
  document.getElementById('ev-filename').textContent = filename;
  document.getElementById('ev-content').value = content;
  viewer.style.display = 'flex';
}

// CSV export — grouped by CAM
function exportCSV(){
  if(!logs.length){ alert('尚無 NG 紀錄'); return; }
  const proj = document.getElementById('proj').value || '場記';
  const spk  = document.getElementById('spk').value || '';
  const date = now.toLocaleDateString('zh-TW');

  const groups = {}, groupOrder = [];
  [...logs].reverse().forEach(l => {
    const key = l.roll ? 'CAM'+l.roll : '未分組';
    if(!groups[key]){ groups[key]=[]; groupOrder.push(key); }
    groups[key].push(l);
  });

  let csv = '專案,' + proj + '\n講者,' + spk + '\n日期,' + date + '\n\n';
  groupOrder.forEach(cam => {
    csv += cam + '\n#,Timecode,PPT頁數,NG類型,備註\n';
    groups[cam].forEach((l,i) => {
      csv += `${i+1},${l.tc},${l.ppt?'p.'+l.ppt:'-'},${TYPES[l.type]},"${l.note||''}"\n`;
    });
    csv += '\n';
  });

  triggerDownload(csv, proj+'_場記_'+date.replace(/\//g,'-')+'.csv', 'text/csv');
}

// SRT export — one file per CAM
function exportSRT(){
  if(!logs.length){ alert('尚無 NG 紀錄'); return; }
  const proj = document.getElementById('proj').value || '場記';
  const date = now.toLocaleDateString('zh-TW').replace(/\//g,'-');

  function toSRT(tc){
    const parts = tc.split(':');
    while(parts.length < 3) parts.unshift('00');
    return parts.map(p=>String(p).padStart(2,'0')).join(':') + ',000';
  }
  function addSecs(tc, s){
    const parts = tc.split(':').map(Number);
    let total = (parts[0]||0)*3600 + (parts[1]||0)*60 + (parts[2]||0) + s;
    return pad(Math.floor(total/3600))+':'+pad(Math.floor(total%3600/60))+':'+pad(total%60)+',000';
  }

  const groups = {}, groupOrder = [];
  [...logs].reverse().forEach(l => {
    const key = l.roll ? 'CAM'+l.roll : '未分組';
    if(!groups[key]){ groups[key]=[]; groupOrder.push(key); }
    groups[key].push(l);
  });

  if(isIOS()){
    // iOS: if multiple CAMs, ask which one; else export directly
    if(groupOrder.length === 1){
      const cam = groupOrder[0];
      triggerDownload(buildSRT(groups[cam], addSecs, toSRT), `${proj}_${cam}_${date}.srt`, 'text/plain');
    } else {
      // show picker
      const choice = prompt('有多個 CAM，輸入要匯出的 CAM 號（或輸入 all 全部合併）:\n'+groupOrder.join(', '));
      if(!choice) return;
      if(choice.trim().toLowerCase()==='all'){
        let all = '';
        let idx = 1;
        groupOrder.forEach(cam=>{
          groups[cam].forEach(l=>{
            const ppt=l.ppt?' p.'+l.ppt:''; const note=l.note?' — '+l.note:'';
            all+=`${idx}\n${toSRT(l.tc)} --> ${addSecs(l.tc,3)}\n[${TYPES[l.type]}] ${cam}${ppt}${note}\n\n`;
            idx++;
          });
        });
        triggerDownload(all, `${proj}_ALL_${date}.srt`, 'text/plain');
      } else {
        const key = groupOrder.find(k=>k.toLowerCase().includes(choice.toLowerCase()));
        if(!key){ alert('找不到 '+choice); return; }
        triggerDownload(buildSRT(groups[key], addSecs, toSRT), `${proj}_${key}_${date}.srt`, 'text/plain');
      }
    }
  } else {
    // Desktop: download all CAMs with delay
    groupOrder.forEach((cam, gi) => {
      setTimeout(()=>{
        triggerDownload(buildSRT(groups[cam], addSecs, toSRT), `${proj}_${cam}_${date}.srt`, 'text/plain');
      }, gi * 700);
    });
  }
}

function buildSRT(entries, addSecs, toSRT){
  let srt = '';
  entries.forEach((l, i) => {
    const ppt  = l.ppt  ? ' p.'+l.ppt  : '';
    const note = l.note ? ' — '+l.note  : '';
    srt += `${i+1}\n${toSRT(l.tc)} --> ${addSecs(l.tc,3)}\n[${TYPES[l.type]}]${ppt}${note}\n\n`;
  });
  return srt;
}
