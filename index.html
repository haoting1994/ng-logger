<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#222426">
<title>DT STUDIO | 場記表</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{color-scheme:dark}
html,body{min-height:100%;background:#222426!important;color:#e8e8e6!important;font-family:'Noto Sans TC',sans-serif;font-size:14px;overscroll-behavior:none}
:root{--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif}

/* HEADER */
#hdr{background:#2c2e31!important;border-bottom:1px solid rgba(255,255,255,.10);position:sticky;top:0;z-index:50}
#hdr-in{max-width:560px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;gap:8px}
.logo{font-family:var(--mono);font-size:14px;color:#d4711a;font-weight:500;letter-spacing:.04em}
.sep{width:1px;height:18px;background:rgba(255,255,255,.18);align-self:center}
.title-txt{font-size:14px;font-weight:500;color:#e8e8e6}
.spacer{flex:1}
#sync-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s}
#sync-dot.ok{background:#3a7d44}
#sync-dot.err{background:#c0392b}
.hdr-btn{background:#363739!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:6px;color:#d4711a!important;font-size:11px;font-family:var(--mono);padding:4px 9px;cursor:pointer;-webkit-appearance:none;white-space:nowrap}
.date-chip{font-family:var(--mono);font-size:11px;color:#888885;background:#363739;border:1px solid rgba(255,255,255,.10);border-radius:4px;padding:3px 8px;white-space:nowrap}

/* APP */
#app{padding:10px 14px 30px;display:flex;flex-direction:column;gap:8px;max-width:560px;margin:0 auto}

/* CARD */
.card{background:#2c2e31!important;border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:12px}
.clabel{font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:#c8c8c4;font-family:var(--mono);font-weight:500;margin-bottom:10px}

/* TIMER */
.timer-row{display:flex;align-items:center;gap:8px}
#timer{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:2px;color:#888885;flex:1;transition:color .3s}
#timer.on{color:#d4711a;text-shadow:0 0 20px rgba(212,113,26,.35)}

/* WAVEFORM bars */
#waveform{display:flex;align-items:center;gap:3px;height:28px;opacity:0;transition:opacity .4s;margin-right:2px}
#waveform.on{opacity:1}
#waveform span{display:block;width:4px;border-radius:3px;background:#d4711a;transform-origin:center}
#waveform span:nth-child(1){animation:wave 1.0s ease-in-out infinite;height:8px}
#waveform span:nth-child(2){animation:wave 1.0s ease-in-out infinite .15s;height:18px}
#waveform span:nth-child(3){animation:wave 1.0s ease-in-out infinite .3s;height:26px}
#waveform span:nth-child(4){animation:wave 1.0s ease-in-out infinite .15s;height:18px}
#waveform span:nth-child(5){animation:wave 1.0s ease-in-out infinite .05s;height:10px}
@keyframes wave{
  0%,100%{transform:scaleY(1);opacity:.7}
  50%{transform:scaleY(.3);opacity:1}
}
.roll-btn{background:#5db870!important;border:none;border-radius:6px;color:#fff!important;font-family:var(--mono);font-size:13px;font-weight:500;padding:9px 14px;cursor:pointer;-webkit-appearance:none;transition:background .15s}
.roll-btn:active{background:#3a7d44!important}
.stop-btn{background:#e05c5a!important;border:none;border-radius:6px;color:#fff!important;font-family:var(--mono);font-size:13px;font-weight:500;padding:9px 14px;cursor:pointer;-webkit-appearance:none;transition:background .15s}
.stop-btn:active{background:#c0392b!important}

/* INPUTS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#c8c8c4;font-family:var(--mono);font-weight:500}
.field input{background:#363739!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:6px;color:#e8e8e6!important;font-size:16px;font-family:var(--sans);padding:7px 9px;width:100%;outline:none;-webkit-appearance:none}
.field input::placeholder{color:#555552}

/* TIMECODE field */
.tc-field{display:flex;flex-direction:column;gap:4px}
.tc-label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#3a9d54;font-family:var(--mono);font-weight:500}
.tc-wrap{display:flex;gap:4px}
.tc-input{background:#0d2218!important;border:1px solid #2d6e4a!important;border-radius:6px;color:#5ecf80!important;font-size:16px;font-family:var(--mono);padding:7px 9px;flex:1;outline:none;-webkit-appearance:none}
.tc-input::placeholder{color:#1d4a2a}
.grab-btn{background:#0d2218!important;border:1px solid #2d6e4a!important;border-radius:6px;color:#5ecf80!important;font-size:18px;padding:0 12px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}

/* TYPE BUTTONS */
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.tbtn{border-radius:6px;border:1px solid rgba(255,255,255,.10);background:#363739!important;color:#888885;font-size:11px;font-weight:500;padding:9px 4px 8px;text-align:center;cursor:pointer;line-height:1.4;display:flex;flex-direction:column;align-items:center;gap:4px;-webkit-appearance:none}
.tbtn .ti{font-size:16px}
.tbtn:active{transform:scale(.96)}
.tbtn.t0{border-color:#b87a12!important;color:#b87a12!important;background:rgba(184,122,18,.2)!important}
.tbtn.t1{border-color:rgba(255,255,255,.6)!important;color:#e8e8e6!important;background:rgba(255,255,255,.08)!important}
.tbtn.t2{border-color:#185fa5!important;color:#7ab0e0!important;background:rgba(26,92,140,.2)!important}
.tbtn.t3{border-color:#5f5e5a!important;color:#9a9993!important;background:rgba(74,85,104,.2)!important}
.tbtn.unsel{opacity:.30!important;border-color:rgba(255,255,255,.08)!important;background:#2c2e31!important;color:#555552!important}

/* PHOTO */
.photo-box{border:1px dashed rgba(255,255,255,.18);border-radius:6px;background:#363739!important;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;min-height:56px}
.photo-box img{width:100%;height:100%;object-fit:cover;display:block}
.ph-ph{display:flex;flex-direction:column;align-items:center;gap:3px;color:#555552;font-size:11px}
.ph-ph .phi{font-size:20px}
#photo-input{display:none}

/* NOTE */
.note-inp{width:100%;background:#363739!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:6px;color:#e8e8e6!important;font-size:16px;padding:7px 9px;outline:none;margin-bottom:8px;-webkit-appearance:none;font-family:var(--sans)}
.note-inp::placeholder{color:#555552}

/* REC BTN */
.rec-btn{width:100%;background:#c0392b!important;border:none;border-radius:6px;color:#fff!important;font-size:15px;font-weight:700;font-family:var(--mono);letter-spacing:.08em;padding:13px;cursor:pointer;-webkit-appearance:none}
.rec-btn:active{opacity:.82}

/* LOG */
.log-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.log-cnt{font-family:var(--mono);font-size:11px;color:#888885;flex:1}
.lbtn{background:#363739!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:6px;color:#e8e8e6!important;font-size:12px;padding:6px 11px;cursor:pointer;-webkit-appearance:none;font-family:var(--sans)}
.lbtn.save{color:#3a9d54!important;border-color:rgba(58,157,84,.35)!important;font-weight:500}
.log-empty{font-size:13px;color:#555552;text-align:center;padding:14px 0;font-family:var(--mono)}
.li{display:grid;grid-template-columns:20px 1fr auto;gap:5px;align-items:start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.li:last-child{border-bottom:none}
.li-num{font-size:11px;color:#555552;padding-top:2px;font-family:var(--mono)}
.li-main{display:flex;flex-direction:column;gap:3px}
.li-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.li-cam{font-family:var(--mono);font-size:11px;color:#d4711a;background:rgba(212,113,26,.15);border:1px solid rgba(212,113,26,.3);border-radius:3px;padding:1px 5px}
.li-tc{font-family:var(--mono);font-size:14px;font-weight:500;color:#e8e8e6}
.li-ppt{font-family:var(--mono);font-size:11px;color:#888885}
.badge{font-size:11px;padding:1px 8px;border-radius:20px;font-weight:500;display:inline-block}
.b0{background:rgba(184,122,18,.2);color:#d4a843;border:1px solid rgba(184,122,18,.3)}
.b1{background:rgba(192,57,43,.2);color:#e06b6a;border:1px solid rgba(192,57,43,.3)}
.b2{background:rgba(26,92,140,.2);color:#7ab0e0;border:1px solid rgba(26,92,140,.3)}
.b3{background:rgba(74,85,104,.2);color:#888885;border:1px solid rgba(74,85,104,.3)}
.li-thumb{width:64px;height:44px;border-radius:4px;object-fit:cover;border:1px solid rgba(255,255,255,.10);cursor:zoom-in;display:block;margin-top:4px}
.li-note{font-size:12px;color:#888885;font-style:italic}
.del-btn{background:none!important;border:none!important;cursor:pointer;color:#555552;font-size:15px;padding:0 2px}
.del-btn:hover{color:#c0392b}

/* FLASH */
#flash-ov{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
#flash-ov.fire{animation:fbg .65s ease-out forwards}
@keyframes fbg{0%{opacity:0;background:rgba(0,0,0,0)}12%{opacity:1;background:rgba(255,255,255,.10)}40%{opacity:1;background:rgba(0,0,0,0)}100%{opacity:0}}
#flash-ic{font-size:88px;opacity:0;transform:scale(.3)}
#flash-ov.fire #flash-ic{animation:fburst .6s cubic-bezier(.18,1.5,.4,1) forwards}
@keyframes fburst{0%{opacity:0;transform:scale(.3)}25%{opacity:1;transform:scale(1.2)}55%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);cursor:zoom-out}
#lightbox.on{display:flex}
#lightbox img{max-width:94vw;max-height:88vh;border-radius:8px;object-fit:contain}

/* ARCHIVE MODAL */
#arch-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
#arch-modal.on{display:block}
.am-card{background:#2c2e31!important;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:16px;max-width:560px;margin:20px auto}
.am-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.10);padding-bottom:12px;margin-bottom:12px}
.am-title{font-size:15px;font-weight:500;color:#e8e8e6}
.am-close{background:#363739!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:6px;color:#888885!important;font-size:12px;padding:5px 10px;cursor:pointer;-webkit-appearance:none}

/* SESSION ITEMS */
.si{background:#363739!important;border:1px solid rgba(255,255,255,.10);border-radius:8px;padding:12px;margin-bottom:6px;cursor:pointer}
.si:hover{border-color:rgba(212,113,26,.4)}
.si-title{font-size:14px;font-weight:500;color:#e8e8e6;margin-bottom:3px}
.si-meta{font-size:11px;color:#888885;font-family:var(--mono)}
.sd{display:none;background:#252628;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:12px;margin-top:-2px;margin-bottom:8px}
.sd.on{display:block}

/* TABLE */
.ss-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;margin-bottom:12px}
.ss-tbl th{background:#363739;padding:6px 7px;text-align:left;font-weight:500;color:#888885;border-bottom:1px solid rgba(255,255,255,.14);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase}
.ss-tbl td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:middle;color:#e8e8e6}
.ss-tbl tr:last-child td{border-bottom:none}
.cam-hdr{background:rgba(212,113,26,.12);color:#d4711a;font-family:var(--mono);font-size:11px;font-weight:500;padding:5px 7px;letter-spacing:.06em}
.ss-badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500}
.exp-row{display:flex;gap:8px}
.exp-btn{flex:1;border:none;border-radius:6px;color:#fff!important;font-size:13px;font-weight:500;font-family:var(--mono);padding:10px;cursor:pointer;-webkit-appearance:none}
.exp-srt{background:#d4711a!important}
.exp-csv{background:#3a7d44!important}

/* iOS EXPORT VIEWER */
#ev-wrap{display:none;position:fixed;inset:0;z-index:950;background:rgba(0,0,0,.92);flex-direction:column;padding:16px;gap:10px}
#ev-wrap.on{display:flex}
</style>
</head>
<body>

<div id="flash-ov"><div id="flash-ic"></div></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lb-img" src="" alt="PPT"></div>

<!-- ARCHIVE MODAL -->
<div id="arch-modal">
  <div class="am-card">
    <div class="am-head">
      <div class="am-title">📂 已儲存場次（最近3天）</div>
      <button class="am-close" onclick="closeArchive()">✕ 關閉</button>
    </div>
    <div id="arch-list"><div class="log-empty">載入中…</div></div>
  </div>
</div>

<!-- iOS EXPORT VIEWER -->
<div id="ev-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span id="ev-fn" style="font-family:monospace;font-size:13px;color:#d4711a;flex:1;padding-right:10px;word-break:break-all"></span>
    <button onclick="document.getElementById('ev-wrap').classList.remove('on')"
      style="background:#363739;border:1px solid #555;color:#ccc;border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;flex-shrink:0">✕</button>
  </div>
  <button id="ev-copy-btn"
    style="background:#3a7d44;border:none;color:#fff;border-radius:6px;padding:10px;font-size:14px;font-weight:500;cursor:pointer">複製全部內容</button>
  <textarea id="ev-ta" readonly
    style="flex:1;background:#1c1d1f;border:1px solid #333;border-radius:6px;color:#e8e8e6;font-family:monospace;font-size:12px;padding:10px;resize:none;-webkit-user-select:text;user-select:text"></textarea>
  <p style="font-size:11px;color:#666;text-align:center">複製後貼到記事本，存成 .srt 或 .csv 檔</p>
</div>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-in">
    <div class="logo">DT STUDIO</div>
    <div class="sep"></div>
    <div class="title-txt">場記表</div>
    <div class="spacer"></div>
    <div id="sync-dot" title="Firebase 同步狀態"></div>
    <button class="hdr-btn" onclick="openArchive()">⇄ 場次</button>
    <div class="date-chip" id="date-chip">—</div>
  </div>
</div>

<div id="app">
  <!-- TIMER + META -->
  <div class="card">
    <div class="timer-row">
      <div id="timer">00:00:00</div>
      <div id="waveform"><span></span><span></span><span></span><span></span><span></span></div>
      <button class="roll-btn" onclick="startTimer()">▶ ROLL</button>
      <button class="stop-btn" onclick="stopTimer()">■ STOP</button>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div class="field"><label>專案名稱</label><input id="proj" placeholder="Webinar 標題"></div>
      <div class="field"><label>講者</label><input id="spk" placeholder="姓名"></div>
    </div>
  </div>

  <!-- NG FORM -->
  <div class="card">
    <div class="clabel" style="display:none">記錄 NG</div>
    <div class="type-grid">
      <button class="tbtn t0" id="ty0" onclick="pickType(0)"><span class="ti">⚠️</span>NG</button>
      <button class="tbtn t1" id="ty1" onclick="pickType(1)"><span class="ti">🔄</span>重來</button>
      <button class="tbtn t2" id="ty2" onclick="pickType(2)"><span class="ti">🎙</span>Mic異音</button>
      <button class="tbtn t3" id="ty3" onclick="pickType(3)"><span class="ti">🚨</span>現場狀況</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:flex-end">
      <div class="field" style="width:86px;flex-shrink:0">
        <label>檔號 CAM</label>
        <input id="f-roll" type="number" min="1" placeholder="CAM #" style="text-align:center">
      </div>
      <div class="tc-field" style="flex:1;min-width:0">
        <div class="tc-label">Timecode</div>
        <div class="tc-wrap">
          <input class="tc-input" id="f-tc" placeholder="00:00:00" style="min-width:0">
          <button class="grab-btn" onclick="grabTC()" style="width:44px;flex-shrink:0;font-size:20px">⏱</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:flex-start">
      <div class="field" style="width:86px;flex-shrink:0">
        <label>PPT 頁數</label>
        <input id="f-ppt" type="number" min="1" placeholder="第 ? 頁" style="text-align:center">
      </div>
      <div class="field" style="flex:1;min-width:0">
        <label>PPT 照片</label>
        <div class="photo-box" id="photo-box" onclick="document.getElementById('photo-input').click()">
          <div class="ph-ph"><span class="phi">📷</span><span>拍照 / 選圖</span></div>
        </div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="onPhoto(event)">
      </div>
    </div>
    <input class="note-inp" id="f-note" placeholder="備註（選填）">
    <button class="rec-btn" onclick="addNG()">⚡ 紀錄</button>
  </div>

  <!-- LOG LIST -->
  <div class="card">
    <div class="log-hdr">
      <span class="log-cnt" id="log-cnt">記錄表 0 筆</span>
      <button class="lbtn save" onclick="saveSession()">💾 儲存場次</button>
      <button class="lbtn" onclick="clearCurrent()">清空</button>
    </div>
    <div id="log-list"><div class="log-empty">— 尚無紀錄 —</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, writeBatch }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {
  apiKey:"AIzaSyAA_lBeMcU_MHwBIakycWMY1qVFQpNFlLw",
  authDomain:"dt-studio-5bb2b.firebaseapp.com",
  projectId:"dt-studio-5bb2b",
  storageBucket:"dt-studio-5bb2b.firebasestorage.app",
  messagingSenderId:"453498810482",
  appId:"1:453498810482:web:265ae1a1aac433355e52eb"
};
const db = getFirestore(initializeApp(FB));

// ── CONSTANTS ─────────────────────────────────────────────────
const TYPES    = ['NG','重來','Mic異音','現場狀況'];
const FLASH_IC = ['⚠️','🔄','🎙','🚨'];
const BADGE_C  = ['b0','b1','b2','b3'];
const SS_BADGE = [
  'background:rgba(184,122,18,.2);color:#d4a843;border:1px solid rgba(184,122,18,.3)',
  'background:rgba(192,57,43,.2);color:#e06b6a;border:1px solid rgba(192,57,43,.3)',
  'background:rgba(26,92,140,.2);color:#7ab0e0;border:1px solid rgba(26,92,140,.3)',
  'background:rgba(74,85,104,.2);color:#888885;border:1px solid rgba(74,85,104,.3)',
];

// ── STATE ─────────────────────────────────────────────────────
let elapsed=0, running=false, tint=null;
let logs=[], selType=0, photoData=null;
const now = new Date();
const TODAY = now.toISOString().slice(0,10);

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('date-chip').textContent =
  now.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit',weekday:'short'});

function pad(n){return String(n).padStart(2,'0')}
function s2tc(s){return pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60)}
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1)}
function setDot(s){const d=document.getElementById('sync-dot');d.className='';if(s)d.classList.add(s)}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(){
  if(running)return;
  running=true;
  document.getElementById('timer').classList.add('on');
  document.getElementById('waveform').classList.add('on');
  tint=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=s2tc(elapsed)},1000);
}
function stopTimer(){
  if(!running)return;
  running=false; clearInterval(tint); elapsed=0;
  document.getElementById('timer').textContent='00:00:00';
  document.getElementById('timer').classList.remove('on');
  document.getElementById('waveform').classList.remove('on');
  const el=document.getElementById('f-roll');
  const c=parseInt(el.value)||0; if(c>0) el.value=c+1;
  document.getElementById('f-ppt').value='';
}
function grabTC(){document.getElementById('f-tc').value=s2tc(elapsed)}

// ── TYPE ──────────────────────────────────────────────────────
function pickType(i){
  selType=i;
  for(let j=0;j<4;j++){
    const b=document.getElementById('ty'+j);
    j===i ? b.classList.remove('unsel') : b.classList.add('unsel');
  }
}
pickType(0);

// ── PHOTO ─────────────────────────────────────────────────────
function onPhoto(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    photoData=ev.target.result;
    document.getElementById('photo-box').innerHTML='<img src="'+photoData+'" alt="PPT">';
  };
  r.readAsDataURL(f);
}

// ── FLASH ─────────────────────────────────────────────────────
function fireFlash(t){
  const ov=document.getElementById('flash-ov');
  document.getElementById('flash-ic').textContent=FLASH_IC[t];
  ov.classList.remove('fire'); void ov.offsetWidth; ov.classList.add('fire');
  setTimeout(()=>ov.classList.remove('fire'),700);
}

// ── ADD NG (local) ────────────────────────────────────────────
function addNG(){
  const tc  =document.getElementById('f-tc').value.trim()||s2tc(elapsed);
  const roll=document.getElementById('f-roll').value.trim();
  const ppt =document.getElementById('f-ppt').value.trim();
  const note=document.getElementById('f-note').value.trim();
  logs.unshift({tc,roll,ppt,note,type:selType,photo:photoData,id:Date.now()});
  document.getElementById('f-tc').value='';
  document.getElementById('f-ppt').value='';
  document.getElementById('f-note').value='';
  photoData=null;
  document.getElementById('photo-box').innerHTML='<div class="ph-ph"><span class="phi">📷</span><span>拍照 / 選圖</span></div>';
  document.getElementById('photo-input').value='';
  fireFlash(selType);
  renderLogs();
}

function delLog(id){logs=logs.filter(l=>l.id!==id);renderLogs()}

function clearCurrent(){
  if(!logs.length)return;
  if(confirm('確定清空目前 NG 紀錄？')){logs=[];renderLogs();}
}

function renderLogs(){
  document.getElementById('log-cnt').textContent='記錄表 '+logs.length+' 筆';
  const el=document.getElementById('log-list');
  if(!logs.length){el.innerHTML='<div class="log-empty">— 尚無紀錄 —</div>';return;}
  el.innerHTML=logs.map((l,i)=>`
    <div class="li">
      <span class="li-num">#${logs.length-i}</span>
      <div class="li-main">
        <div class="li-top">
          ${l.roll?`<span class="li-cam">CAM${l.roll}</span>`:''}
          <span class="li-tc">${l.tc}</span>
          ${l.ppt?`<span class="li-ppt">p.${l.ppt}</span>`:''}
          <span class="badge ${BADGE_C[l.type]}">${TYPES[l.type]}</span>
        </div>
        ${l.photo?`<img class="li-thumb" src="${l.photo}" onclick="openLightbox('${l.photo}')" alt="PPT">`:''}
        ${l.note?`<div class="li-note">${l.note}</div>`:''}
      </div>
      <button class="del-btn" onclick="delLog(${l.id})">✕</button>
    </div>`).join('');
}

// ── SAVE SESSION → FIRESTORE ──────────────────────────────────
async function saveSession(){
  if(!logs.length){alert('尚無 NG 紀錄可儲存');return;}
  const proj=document.getElementById('proj').value.trim()||'未命名專案';
  const spk =document.getElementById('spk').value.trim();
  const sid =TODAY.replace(/-/g,'')+'_'+Date.now();
  const savedTime=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:true});
  setDot('');
  try{
    await setDoc(doc(db,'ng-archive',sid),{sid,proj,spk,date:TODAY,savedAt:Date.now(),count:logs.length,savedTime});
    const batch=writeBatch(db);
    logs.forEach(l=>batch.set(
      doc(db,'ng-archive',sid,'logs',String(l.id)),
      {tc:l.tc,roll:l.roll||'',ppt:l.ppt||'',note:l.note||'',type:l.type,id:l.id}
    ));
    await batch.commit();
    setDot('ok');
    alert('✓ 已儲存「'+proj+'」— '+logs.length+' 筆 NG');
    logs=[]; renderLogs();
    document.getElementById('proj').value='';
    document.getElementById('spk').value='';
  }catch(e){setDot('err');alert('儲存失敗：'+e.message);}
}

// ── ARCHIVE MODAL ─────────────────────────────────────────────
async function openArchive(){
  document.getElementById('arch-modal').classList.add('on');
  const list=document.getElementById('arch-list');
  list.innerHTML='<div class="log-empty">載入中…</div>';
  const cutoff=new Date(now);
  cutoff.setDate(cutoff.getDate()-3);
  const co=cutoff.toISOString().slice(0,10);
  try{
    const snap=await getDocs(collection(db,'ng-archive'));
    const sessions=snap.docs.map(d=>d.data())
      .filter(s=>s.date&&s.date>=co)
      .sort((a,b)=>b.savedAt-a.savedAt);
    if(!sessions.length){
      list.innerHTML='<div class="log-empty">最近三天尚無儲存場次</div>';return;
    }
    list.innerHTML=sessions.map(s=>`
      <div class="si" onclick="toggleDetail('${s.sid}',this)">
        <div class="si-title">${s.proj||'未命名'}${s.spk?' — '+s.spk:''}</div>
        <div class="si-meta">${s.date}${s.savedTime?' '+s.savedTime:''}　${s.count||0} 筆 NG　▶ 點開查看</div>
      </div>
      <div class="sd" id="sd-${s.sid}"></div>
    `).join('');
  }catch(e){
    list.innerHTML='<div class="log-empty" style="color:#e06b6a">載入失敗：'+e.message+'</div>';
  }
}

function closeArchive(){document.getElementById('arch-modal').classList.remove('on')}

async function toggleDetail(sid,itemEl){
  const detail=document.getElementById('sd-'+sid);
  if(detail.classList.contains('on')){detail.classList.remove('on');detail.innerHTML='';return;}
  detail.innerHTML='<div class="log-empty">載入中…</div>';
  detail.classList.add('on');
  try{
    const snap=await getDocs(query(collection(db,'ng-archive',sid,'logs'),orderBy('id','asc')));
    const rows=snap.docs.map(d=>d.data());
    if(!rows.length){detail.innerHTML='<div class="log-empty">無紀錄</div>';return;}

    const groups={},gOrder=[];
    rows.forEach(l=>{
      const k=l.roll?'CAM'+l.roll:'—';
      if(!groups[k]){groups[k]=[];gOrder.push(k);}
      groups[k].push(l);
    });

    // get proj name for this session
    const allSnap=await getDocs(collection(db,'ng-archive'));
    const meta=allSnap.docs.map(d=>d.data()).find(d=>d.sid===sid);
    const projName=meta?.proj||'場記';

    let tbl=`<table class="ss-tbl"><thead><tr>
      <th style="width:22px">#</th>
      <th style="width:80px">Timecode</th>
      <th style="width:40px">PPT</th>
      <th>NG 類型</th>
      <th>備註</th></tr></thead><tbody>`;
    let n=1;
    gOrder.forEach(cam=>{
      tbl+=`<tr><td colspan="5" class="cam-hdr">▶ ${cam}</td></tr>`;
      groups[cam].forEach(l=>{
        tbl+=`<tr>
          <td style="color:#555;font-family:monospace">${n++}</td>
          <td style="font-family:monospace;font-weight:500">${l.tc}</td>
          <td style="font-family:monospace">${l.ppt?'p.'+l.ppt:'—'}</td>
          <td><span class="ss-badge" style="${SS_BADGE[l.type]}">${TYPES[l.type]}</span></td>
          <td style="color:#888;font-size:11px">${l.note||'—'}</td>
        </tr>`;
      });
    });
    tbl+='</tbody></table>';

    const encProj=encodeURIComponent(projName);
    detail.innerHTML=tbl+`
      <div class="exp-row">
        <button class="exp-btn exp-srt" onclick="dlSRT('${sid}','${encProj}')">↓ SRT (Premiere)</button>
        <button class="exp-btn exp-csv" onclick="dlCSV('${sid}','${encProj}')">↓ CSV</button>
      </div>`;
  }catch(e){
    detail.innerHTML='<div class="log-empty" style="color:#e06b6a">'+e.message+'</div>';
  }
}

// ── EXPORT ────────────────────────────────────────────────────
function triggerDL(content,filename,mime){
  if(isIOS()){
    const file=new File([content],filename,{type:mime});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:filename}).catch(()=>showViewer(content,filename));
    }else{showViewer(content,filename);}
  }else{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([content],{type:mime+';charset=utf-8'}));
    a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);
  }
}

function showViewer(content,filename){
  document.getElementById('ev-fn').textContent=filename;
  document.getElementById('ev-ta').value=content;
  document.getElementById('ev-wrap').classList.add('on');
  document.getElementById('ev-copy-btn').onclick=()=>{
    const ta=document.getElementById('ev-ta');
    ta.select();ta.setSelectionRange(0,99999);
    navigator.clipboard?.writeText(ta.value).then(()=>{
      document.getElementById('ev-copy-btn').textContent='✓ 已複製！';
      setTimeout(()=>document.getElementById('ev-copy-btn').textContent='複製全部內容',2000);
    });
  };
}

async function dlSRT(sid,projEnc){
  const proj=decodeURIComponent(projEnc);
  const snap=await getDocs(query(collection(db,'ng-archive',sid,'logs'),orderBy('id','asc')));
  const rows=snap.docs.map(d=>d.data());
  function toSRT(tc){const p=tc.split(':');while(p.length<3)p.unshift('00');return p.map(x=>String(x).padStart(2,'0')).join(':')+',000'}
  function addSec(tc,s){const p=tc.split(':').map(Number);let t=(p[0]||0)*3600+(p[1]||0)*60+(p[2]||0)+s;return pad(Math.floor(t/3600))+':'+pad(Math.floor(t%3600/60))+':'+pad(t%60)+',000'}
  const groups={},gOrder=[];
  rows.forEach(l=>{const k=l.roll||'x';if(!groups[k]){groups[k]=[];gOrder.push(k);}groups[k].push(l);});
  if(isIOS()){
    let srt='';let idx=1;
    gOrder.forEach(k=>groups[k].forEach(l=>{
      const cam=l.roll?'CAM'+l.roll:'';
      const ppt=l.ppt?' p.'+l.ppt:'';const note=l.note?' — '+l.note:'';
      srt+=`${idx}\n${toSRT(l.tc)} --> ${addSec(l.tc,3)}\n[${TYPES[l.type]}] ${cam}${ppt}${note}\n\n`;idx++;
    }));
    triggerDL(srt,proj+'_NG.srt','text/plain');
  }else{
    gOrder.forEach((k,gi)=>{
      let srt='';
      groups[k].forEach((l,i)=>{
        const ppt=l.ppt?' p.'+l.ppt:'';const note=l.note?' — '+l.note:'';
        srt+=`${i+1}\n${toSRT(l.tc)} --> ${addSec(l.tc,3)}\n[${TYPES[l.type]}]${ppt}${note}\n\n`;
      });
      const cl=k!=='x'?'_CAM'+k:'';
      setTimeout(()=>triggerDL(srt,proj+cl+'.srt','text/plain'),gi*700);
    });
  }
}

async function dlCSV(sid,projEnc){
  const proj=decodeURIComponent(projEnc);
  const snap=await getDocs(query(collection(db,'ng-archive',sid,'logs'),orderBy('id','asc')));
  const rows=snap.docs.map(d=>d.data());
  const groups={},gOrder=[];
  rows.forEach(l=>{const k=l.roll?'CAM'+l.roll:'未分組';if(!groups[k]){groups[k]=[];gOrder.push(k);}groups[k].push(l);});
  let csv='專案,'+proj+'\n日期,'+TODAY+'\n\n';
  gOrder.forEach(cam=>{
    csv+=cam+'\n#,Timecode,PPT頁數,NG類型,備註\n';
    groups[cam].forEach((l,i)=>{csv+=`${i+1},${l.tc},${l.ppt?'p.'+l.ppt:'—'},${TYPES[l.type]},"${l.note||''}"\n`;});
    csv+='\n';
  });
  triggerDL(csv,proj+'_場記.csv','text/csv');
}

// ── LIGHTBOX ──────────────────────────────────────────────────
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('on')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');document.getElementById('lb-img').src=''}

// ── EXPOSE ────────────────────────────────────────────────────
window.startTimer=startTimer;window.stopTimer=stopTimer;window.grabTC=grabTC;
window.pickType=pickType;window.onPhoto=onPhoto;window.addNG=addNG;
window.delLog=delLog;window.clearCurrent=clearCurrent;window.saveSession=saveSession;
window.openArchive=openArchive;window.closeArchive=closeArchive;
window.toggleDetail=toggleDetail;window.dlSRT=dlSRT;window.dlCSV=dlCSV;
window.openLightbox=openLightbox;window.closeLightbox=closeLightbox;

renderLogs();
</script>
